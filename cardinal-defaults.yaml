# Consolidated defaults for the Cardinal Lakerunner CloudFormation deployment.
#
# Customer-tunable values appear as parameters on the root template; this file
# provides the defaults. Service-level fields (replicas, cpu, memory) flow
# through to per-tier sub-stacks. Image references default to public ECR /
# GHCR; air-gapped customers override at deploy time via root parameters.

# ---------------------------------------------------------------------------
# API keys (default seed). Real customers override via ApiKeysOverride on root.
# ---------------------------------------------------------------------------
api_keys:
  - organization_id: 12340000-0000-4000-8000-000000000000
    keys:
      - f70603aa00e6f67999cc66e336134887

# ---------------------------------------------------------------------------
# Storage profiles. ${BUCKET_NAME} and ${AWS_REGION} are filled in by the
# config stack at deploy time using CFN intrinsic functions.
# ---------------------------------------------------------------------------
storage_profiles:
  - bucket: "${BUCKET_NAME}"
    cloud_provider: aws
    collector_name: lakerunner
    insecure_tls: false
    instance_num: 1
    organization_id: 12340000-0000-4000-8000-000000000000
    region: "${AWS_REGION}"
    use_path_style: true

# ---------------------------------------------------------------------------
# Container images. Each can be overridden via *Image parameters on the root.
# The migrator runs from the same image as the lakerunner tasks (LakerunnerImage)
# so the two cannot drift; any change to LakerunnerImage retriggers migrations.
# ---------------------------------------------------------------------------
images:
  lakerunner: "public.ecr.aws/cardinalhq.io/lakerunner:v1.40.0"
  maestro:    "public.ecr.aws/cardinalhq.io/maestro:v1.50.0"
  otel:       "public.ecr.aws/cardinalhq.io/cardinalhq-otel-collector:v1.8.0"
  dex:        "public.ecr.aws/cardinalhq.io/dex-customization:v0.1.0"
  dex_init:   "public.ecr.aws/docker/library/busybox:1.37"
  db_init:    "ghcr.io/cardinalhq/initcontainer-grafana:latest"

# ---------------------------------------------------------------------------
# Lakerunner microservices. Each entry's tier (query / process / control) is
# determined by which services-*.yaml child stack owns it; this file does not
# encode the tier mapping (the generators do).
# ---------------------------------------------------------------------------
services:
  lakerunner-pubsub-sqs:
    signal_type: common
    command: ["/app/bin/lakerunner", "pubsub", "sqs"]
    cpu: 1024
    memory_mib: 2048
    replicas: 1
    health_check:
      type: "go"
      command: ["/app/bin/lakerunner", "sysinfo"]
    environment: {}

  lakerunner-process-logs:
    signal_type: logs
    command: ["/app/bin/lakerunner", "process-logs"]
    cpu: 1024
    memory_mib: 2048
    autoscaling:
      min_replicas: 1
      max_replicas: 10
    health_check:
      type: "go"
      command: ["/app/bin/lakerunner", "sysinfo"]
    environment: {}

  lakerunner-process-metrics:
    signal_type: metrics
    command: ["/app/bin/lakerunner", "process-metrics"]
    cpu: 1024
    memory_mib: 2048
    autoscaling:
      min_replicas: 1
      max_replicas: 10
    health_check:
      type: "go"
      command: ["/app/bin/lakerunner", "sysinfo"]
    environment: {}

  lakerunner-process-traces:
    signal_type: traces
    command: ["/app/bin/lakerunner", "process-traces"]
    cpu: 1024
    memory_mib: 2048
    autoscaling:
      min_replicas: 1
      max_replicas: 10
    health_check:
      type: "go"
      command: ["/app/bin/lakerunner", "sysinfo"]
    environment: {}

  lakerunner-sweeper:
    signal_type: common
    command: ["/app/bin/lakerunner", "sweeper"]
    cpu: 256
    memory_mib: 512
    replicas: 1
    health_check:
      type: "go"
      command: ["/app/bin/lakerunner", "sysinfo"]
    environment: {}

  lakerunner-query-api:
    signal_type: common
    command: ["/app/bin/lakerunner", "query-api"]
    cpu: 1024
    memory_mib: 2048
    replicas: 2
    ingress:
      port: 7101
      container_port: 8080
      attach_alb: true
      health_check_path: "/healthz"
      health_check_port: 8090
    health_check:
      type: "go"
      command: ["/app/bin/lakerunner", "sysinfo"]
    environment: {}

  lakerunner-query-worker:
    signal_type: common
    command: ["/app/bin/lakerunner", "query-worker"]
    cpu: 4096
    memory_mib: 8192
    replicas: 8
    ingress:
      port: 8082
      description: "From Query API (gRPC control stream)"
    health_check:
      type: "go"
      command: ["/app/bin/lakerunner", "sysinfo"]
    ephemeral_storage_gib: 100
    environment:
      LAKERUNNER_QUERY_DISABLE_TABLE_CACHE: "true"
      LAKERUNNER_QUERY_MAX_SEGMENTS_PER_WORKER_PER_WAVE: "100"

  lakerunner-monitoring:
    signal_type: common
    command: ["/app/bin/lakerunner", "monitoring", "serve"]
    cpu: 256
    memory_mib: 512
    replicas: 1
    ingress:
      port: 9090
      container_port: 9090
      attach_alb: false
    health_check:
      type: "go"
      command: ["/app/bin/lakerunner", "sysinfo"]
    environment: {}

  lakerunner-admin-api:
    signal_type: common
    command: ["/app/bin/lakerunner", "admin-api", "serve"]
    cpu: 256
    memory_mib: 512
    replicas: 1
    ingress:
      port: 9091
      container_port: 9091
      attach_alb: true
      protocol: HTTP
      health_check_path: "/healthz"
    health_check:
      type: "go"
      command: ["/app/bin/lakerunner", "sysinfo"]
    environment: {}

  lakerunner-alert-evaluator:
    signal_type: common
    command: ["/app/bin/lakerunner", "alert-evaluator"]
    cpu: 256
    memory_mib: 512
    replicas: 1
    health_check:
      type: "go"
      command: ["/app/bin/lakerunner", "sysinfo"]
    environment: {}

# ---------------------------------------------------------------------------
# Maestro task and bundled DEX OIDC.
# ---------------------------------------------------------------------------
maestro:
  task:
    cpu: 1024
    memory_mib: 2048
  ports:
    maestro: 4200
    mcp_gateway: 8080
    mcp_gateway_debug: 9090
    alb_listener: 80
    dex: 5556
  dex:
    path_prefix: "/dex"
    client_id: "maestro-ui"

# ---------------------------------------------------------------------------
# OTEL collector.
# ---------------------------------------------------------------------------
otel:
  otel-gateway:
    # The image's run-with-env-config wrapper writes the YAML from the
    # CHQ_COLLECTOR_CONFIG_YAML env var (set by otel.py) to /tmp and runs
    # the collector against it.
    command: ["/app/bin/run-with-env-config"]
    cpu: 1024
    memory_mib: 2048
    replicas: 1
    environment:
      OTEL_RESOURCE_ATTRIBUTES: "service.name=otel-gateway"
