          - ${CommonInfraStackName}-TaskSGId
          - CommonInfraStackName: !Ref 'CommonInfraStackName'
      IpProtocol: tcp
      SourceSecurityGroupId: !Ref 'AlbSecurityGroup'
      ToPort: 8090
    Type: AWS::EC2::SecurityGroupIngress
  TaskFromNlb9091:
    Condition: EnableAdminApi
    Properties:
      CidrIp: '0.0.0.0/0'
      Description: NLB to admin-api GRPC port
      FromPort: 9091
      GroupId: !ImportValue
        Fn::Sub:
          - ${CommonInfraStackName}-TaskSGId
          - CommonInfraStackName: !Ref 'CommonInfraStackName'
      IpProtocol: tcp
      ToPort: 9091
    Type: AWS::EC2::SecurityGroupIngress
  TaskRole:
    Properties:
      AssumeRolePolicyDocument:
        Statement:
          - Action: sts:AssumeRole
            Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
        Version: '2012-10-17'
      Policies:
        - PolicyDocument:
            Statement:
              - Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                  - s3:ListBucket
                Effect: Allow
                Resource:
                  - !ImportValue
                    Fn::Sub:
                      - ${CommonInfraStackName}-BucketArn
                      - CommonInfraStackName: !Ref 'CommonInfraStackName'
                  - !Sub
                    - ${BucketArn}/*
                    - BucketArn: !ImportValue
                        Fn::Sub:
                          - ${CommonInfraStackName}-BucketArn
                          - CommonInfraStackName: !Ref 'CommonInfraStackName'
              - Action:
                  - sqs:ReceiveMessage
                  - sqs:DeleteMessage
                  - sqs:GetQueueAttributes
                Effect: Allow
                Resource:
                  - !Sub 'arn:aws:sqs:${AWS::Region}:${AWS::AccountId}:lakerunner-*'
              - Action:
                  - secretsmanager:GetSecretValue
                Effect: Allow
                Resource:
                  - !Sub
                    - ${SecretArn}*
                    - SecretArn: !ImportValue
                        Fn::Sub:
                          - ${CommonInfraStackName}-DbSecretArn
                          - CommonInfraStackName: !Ref 'CommonInfraStackName'
                  - !Sub
                    - ${SecretArn}*
                    - SecretArn: !ImportValue
                        Fn::Sub:
                          - ${CommonInfraStackName}-MSKCredentialsArn
                          - CommonInfraStackName: !Ref 'CommonInfraStackName'
                  - !Sub
                    - ${SecretArn}*
                    - SecretArn: !ImportValue
                        Fn::Sub:
                          - ${CommonInfraStackName}-InternalServiceKeysSecretArn
                          - CommonInfraStackName: !Ref 'CommonInfraStackName'
                  - !Sub 'arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${AWS::StackName}-*'
              - Action:
                  - kms:Decrypt
                  - kms:DescribeKey
                Effect: Allow
                Resource: !ImportValue
                  Fn::Sub:
                    - ${CommonInfraStackName}-MSKSecretsKeyArn
                    - CommonInfraStackName: !Ref 'CommonInfraStackName'
              - Action:
                  - ssmmessages:CreateControlChannel
                  - ssmmessages:CreateDataChannel
                  - ssmmessages:OpenControlChannel
                  - ssmmessages:OpenDataChannel
                Effect: Allow
                Resource: '*'
              - Action:
                  - logs:DescribeLogGroups
                  - logs:CreateLogStream
                  - logs:DescribeLogStreams
                  - logs:PutLogEvents
                Effect: Allow
                Resource: '*'
            Version: '2012-10-17'
          PolicyName: S3AndSQSAccess
      RoleName: !Sub '${AWS::StackName}-task-role'
    Type: AWS::IAM::Role
