  ProcessMetricsReplicas:
    Default: '10'
    Description: Maximum number of lakerunner-process-metrics tasks (scaled by monitoring service)
    MaxValue: 50
    MinValue: 1
    Type: Number
  ProcessTracesMemory:
    AllowedValues:
