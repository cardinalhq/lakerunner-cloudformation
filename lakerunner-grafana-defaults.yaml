# Grafana configuration for Lakerunner deployment
# This file contains configuration for Grafana only. The MCP Gateway,
# Conductor, and Maestro sidecars have moved to a separate stack
# (see lakerunner-maestro-defaults.yaml).

# Database configuration (used by Setup stack)
database:
  name: "lakerunner_grafana"
  user: "grafana"

# Container Images configuration
images:
  grafana: "grafana/grafana:latest"
  grafana_init: "ghcr.io/cardinalhq/initcontainer-grafana:latest"

# Task-level resource allocation (shared by all containers)
task:
  cpu: 2048
  memory_mib: 4096

# Grafana service configuration
grafana:
  replicas: 1
  ingress:
    port: 3000
    health_check_path: "/api/health"
  environment:
    GF_SECURITY_ADMIN_USER: "lakerunner"
    GF_SECURITY_ADMIN_PASSWORD: "from_secret"
    GF_SERVER_HTTP_PORT: "3000"
    GF_SERVER_ROOT_URL: "%(protocol)s://%(domain)s:%(http_port)s"
    GF_PLUGINS_PREINSTALL_SYNC: "cardinalhq-lakerunner-datasource@2.4.3@https://github.com/cardinalhq/cardinalhq-lakerunner-datasource/releases/download/v2.4.3/cardinalhq-lakerunner-datasource.zip,cardinalhq-cardinal-app@0.3.4@https://github.com/cardinalhq/cardinalhq-cardinal-app/releases/download/v0.3.4/cardinalhq-cardinal-app.zip"
    GF_PLUGINS_ALLOW_LOADING_UNSIGNED_PLUGINS: "cardinalhq-lakerunner-datasource,cardinalhq-cardinal-app"
    GF_PATHS_PROVISIONING: "/etc/grafana/provisioning"
    # PostgreSQL database configuration
    GF_DATABASE_TYPE: "postgres"
    GF_DATABASE_SSL_MODE: "require"
  database:
    type: "postgres"
    ssl_mode: "require"
  health_check:
    type: "curl"
    command: ["curl", "-f", "http://localhost:3000/api/health"]

# API Keys configuration (for datasource setup)
api_keys:
  - organization_id: 12340000-0000-4000-8000-000000000000
    keys:
      - f70603aa00e6f67999cc66e336134887
