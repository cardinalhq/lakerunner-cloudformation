        - PolicyDocument:
            Statement:
              - Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                  - s3:ListBucket
                Effect: Allow
                Resource:
                  - !ImportValue
                    Fn::Sub:
                      - ${CommonInfraStackName}-BucketArn
                      - CommonInfraStackName: !Ref 'CommonInfraStackName'
                  - !Sub
                    - ${BucketArn}/*
                    - BucketArn: !ImportValue
                        Fn::Sub:
                          - ${CommonInfraStackName}-BucketArn
                          - CommonInfraStackName: !Ref 'CommonInfraStackName'
              - Action:
                  - secretsmanager:GetSecretValue
                Effect: Allow
                Resource:
                  - !Sub
                    - ${SecretArn}*
                    - SecretArn: !ImportValue
                        Fn::Sub:
                          - ${CommonInfraStackName}-DbSecretArn
                          - CommonInfraStackName: !Ref 'CommonInfraStackName'
                  - !Sub
                    - ${SecretArn}*
                    - SecretArn: !ImportValue
                        Fn::Sub:
                          - ${CommonInfraStackName}-MSKCredentialsArn
                          - CommonInfraStackName: !Ref 'CommonInfraStackName'
                  - !Sub
                    - ${SecretArn}*
                    - SecretArn: !ImportValue
                        Fn::Sub:
                          - ${CommonInfraStackName}-InternalServiceKeysSecretArn
                          - CommonInfraStackName: !Ref 'CommonInfraStackName'
                  - !Sub 'arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${AWS::StackName}-*'
              - Action:
                  - kms:Decrypt
                  - kms:DescribeKey
                Effect: Allow
                Resource: !ImportValue
                  Fn::Sub:
                    - ${CommonInfraStackName}-MSKSecretsKeyArn
                    - CommonInfraStackName: !Ref 'CommonInfraStackName'
              - Action:
                  - ecs:ListServices
                  - ecs:DescribeServices
                  - ecs:ListTasks
                  - ecs:DescribeTasks
                Effect: Allow
                Resource: '*'
              - Action:
                  - ssmmessages:CreateControlChannel
                  - ssmmessages:CreateDataChannel
                  - ssmmessages:OpenControlChannel
                  - ssmmessages:OpenDataChannel
                Effect: Allow
                Resource: '*'
              - Action:
                  - logs:DescribeLogGroups
                  - logs:CreateLogStream
                  - logs:DescribeLogStreams
                  - logs:PutLogEvents
                Effect: Allow
                Resource: '*'
            Version: '2012-10-17'
