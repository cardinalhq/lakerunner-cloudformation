Description: 'Lakerunner debug task: long-running container for network troubleshooting via ECS Exec'
Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: Infrastructure
        Parameters:
          - CommonInfraStackName
      - Label:
          default: Container
        Parameters:
          - ContainerImage
    ParameterLabels:
      CommonInfraStackName:
        default: CommonInfra Stack Name
      ContainerImage:
        default: Debug Container Image
Outputs:
  ClusterArn:
    Description: ECS Cluster ARN (for ecs execute-command)
    Value: !ImportValue
      Fn::Sub: ${CommonInfraStackName}-ClusterArn
  ExecCommand:
    Description: Command to get a shell (replace TASK_ID with actual task ID)
    Value: !Sub
      - aws ecs execute-command --cluster ${Cluster} --task TASK_ID --container Debug --interactive --command /bin/sh
      - Cluster: !ImportValue
          Fn::Sub: ${CommonInfraStackName}-ClusterArn
  ListTasksCommand:
    Description: Command to list running debug tasks
    Value: !Sub
      - aws ecs list-tasks --cluster ${Cluster} --service-name ${Service}
      - Cluster: !ImportValue
          Fn::Sub: ${CommonInfraStackName}-ClusterArn
        Service: !Ref 'DebugService'
  ServiceName:
    Description: Debug service name
    Value: !Ref 'DebugService'
Parameters:
  CommonInfraStackName:
    Description: 'REQUIRED: Name of the CommonInfra stack to import values from.'
    Type: String
  ContainerImage:
    Default: nicolaka/netshoot:latest
    Description: 'Debug container image (default: nicolaka/netshoot with dig, nslookup, curl, etc.)'
    Type: String
Resources:
  DebugExecutionRole:
    Properties:
      AssumeRolePolicyDocument:
        Statement:
          - Action: sts:AssumeRole
            Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
        Version: '2012-10-17'
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy
    Type: AWS::IAM::Role
  DebugLogGroup:
    Properties:
      LogGroupName: !Sub '/lakerunner/debug/${AWS::StackName}'
      RetentionInDays: 7
    Type: AWS::Logs::LogGroup
  DebugService:
    Properties:
      Cluster: !ImportValue
        Fn::Sub: ${CommonInfraStackName}-ClusterArn
      DesiredCount: 1
      EnableExecuteCommand: true
      LaunchType: FARGATE
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: DISABLED
          SecurityGroups:
            - !ImportValue
              Fn::Sub: ${CommonInfraStackName}-TaskSGId
          Subnets: !Split
            - ','
            - !ImportValue
              Fn::Sub: ${CommonInfraStackName}-PrivateSubnets
      ServiceName: !Sub '${AWS::StackName}-debug'
      TaskDefinition: !Ref 'DebugTaskDef'
    Type: AWS::ECS::Service
  DebugTaskDef:
    Properties:
      ContainerDefinitions:
        - Command:
            - sleep
            - infinity
          Essential: true
          Image: !Ref 'ContainerImage'
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref 'DebugLogGroup'
              awslogs-region: !Sub '${AWS::Region}'
              awslogs-stream-prefix: debug
          Name: Debug
      Cpu: '256'
      ExecutionRoleArn: !GetAtt 'DebugExecutionRole.Arn'
      Family: lakerunner-debug
      Memory: '512'
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      TaskRoleArn: !GetAtt 'DebugTaskRole.Arn'
    Type: AWS::ECS::TaskDefinition
  DebugTaskRole:
    Properties:
      AssumeRolePolicyDocument:
        Statement:
          - Action: sts:AssumeRole
            Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
        Version: '2012-10-17'
      Policies:
        - PolicyDocument:
            Statement:
              - Action:
                  - ssmmessages:CreateControlChannel
                  - ssmmessages:CreateDataChannel
                  - ssmmessages:OpenControlChannel
                  - ssmmessages:OpenDataChannel
                Effect: Allow
                Resource: '*'
            Version: '2012-10-17'
          PolicyName: EcsExecPolicy
    Type: AWS::IAM::Role

