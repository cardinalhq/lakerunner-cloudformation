# Default configuration for Lakerunner MCP (standalone) deployment
# This deploys the standalone-mcp container for MCP server functionality

# Container Images configuration
images:
  mcp: "public.ecr.aws/cardinalhq.io/lakerunner/standalone-mcp:latest"

# MCP service configuration
mcp:
  cpu: 512
  memory_mib: 1024
  replicas: 1

  # Port configuration
  ports:
    mcp: 8080
    local_api: 20202

  # Environment variables (non-sensitive) - matches k8s deployment
  environment:
    HOME: "/tmp"
    MCP_TRANSPORT: "http"
    AWS_REGION: "us-east-1"

# Default API key (from lakerunner-stack-defaults.yaml)
default_api_key: "f70603aa00e6f67999cc66e336134887"
