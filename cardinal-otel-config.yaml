# Default cardinalhq-otel-collector configuration. The container's
# run-with-env-config wrapper writes this YAML (passed via the
# CHQ_COLLECTOR_CONFIG_YAML env var) to /tmp and runs the collector
# against it. Customers can override the entire config via the root
# OtelConfigYaml parameter.
#
# Pipeline shape: OTLP in (gRPC 4317 / HTTP 4318) -> memory_limiter +
# batch -> awss3 exporter writing partitioned otlp_proto blobs into the
# lakerunner ingest bucket. The lakerunner-pubsub-sqs service consumes
# the resulting S3:ObjectCreated notifications and fans them out to the
# process-{logs,metrics,traces} workers.
#
# Env-var contract (set by the otel child stack):
#   LRDB_S3_BUCKET  - lakerunner ingest bucket
#   LRDB_S3_REGION  - bucket region
#   ORG             - organization UUID for the s3_prefix path
#   COLLECTOR       - collector name (defaults to "lakerunner")

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  memory_limiter:
    limit_mib: 1024
    check_interval: 1s
  # Normalize metric temporality before writing to S3: convert cumulative
  # sums/histograms to delta so the process-metrics worker sees a single
  # temporality. Empty config converts every cumulative metric.
  cumulativetodelta: {}
  batch:
    timeout: 10s
    send_batch_max_size: 2000
    send_batch_size: 1000

exporters:
  awss3/logs:
    s3uploader:
      region: ${env:LRDB_S3_REGION}
      s3_bucket: ${env:LRDB_S3_BUCKET}
      s3_prefix: otel-raw/${env:ORG}/${env:COLLECTOR}
      s3_force_path_style: true
      s3_partition_format: 'year=%Y/month=%m/day=%d/hour=%H/minute=%M'
      compression: gzip
    marshaler: otlp_proto

  awss3/metrics:
    s3uploader:
      region: ${env:LRDB_S3_REGION}
      s3_bucket: ${env:LRDB_S3_BUCKET}
      s3_prefix: otel-raw/${env:ORG}/${env:COLLECTOR}
      s3_force_path_style: true
      s3_partition_format: 'year=%Y/month=%m/day=%d/hour=%H/minute=%M'
      compression: gzip
    marshaler: otlp_proto

  awss3/traces:
    s3uploader:
      region: ${env:LRDB_S3_REGION}
      s3_bucket: ${env:LRDB_S3_BUCKET}
      s3_prefix: otel-raw/${env:ORG}/${env:COLLECTOR}
      s3_force_path_style: true
      s3_partition_format: 'year=%Y/month=%m/day=%d/hour=%H/minute=%M'
      compression: gzip
    marshaler: otlp_proto

connectors:
  # Span-derived service-graph metrics (traces_service_graph_request_total,
  # _request_failed_total, latency histograms, ...). The Maestro trace /
  # service-map view queries these metrics; without this connector spans are
  # still written to S3 but the service graph is empty (numSegments=0). The
  # connector consumes traces and emits metrics into the metrics write path.
  # Single-collector deployment, so no traceID load-balancing is needed;
  # scaling the collector past one replica would require span-pair affinity
  # (traceID-balanced fan-in) for complete graphs.
  #
  # NOTE: the cardinalhq-otel-collector build registers this connector as
  # `service_graph` (underscore), not the upstream `servicegraph` id.
  service_graph:
    metrics_flush_interval: 10s
    store:
      ttl: 10s
    virtual_node_peer_attributes:
      - peer.service
      - server.address
      - http.url
      - url.full
      - net.peer.name
      - rpc.service
      - db.system
      - db.name
      - db.instance.id

extensions:
  health_check:
    endpoint: 0.0.0.0:13133

service:
  extensions:
    - health_check
  pipelines:
    logs:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [awss3/logs]
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, cumulativetodelta, batch]
      exporters: [awss3/metrics]
    # Span-derived service-graph metrics: the servicegraph connector receives
    # traces (fanned out below) and emits metrics through the same S3 metrics
    # write path, so they ingest as ordinary metrics and the trace view renders.
    metrics/servicegraph:
      receivers: [service_graph]
      processors: [memory_limiter, cumulativetodelta, batch]
      exporters: [awss3/metrics]
    traces:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [awss3/traces, service_graph]
