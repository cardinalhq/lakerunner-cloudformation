# Consolidated defaults for the Cardinal Lakerunner CloudFormation deployment.
#
# Customer-tunable values appear as parameters on the root template; this file
# provides the defaults. Service-level fields (replicas, cpu, memory) flow
# through to per-tier sub-stacks. Image references default to public ECR /
# GHCR; air-gapped customers override at deploy time via root parameters.

# ---------------------------------------------------------------------------
# API keys (default seed). Real customers override via ApiKeysOverride on root.
# ---------------------------------------------------------------------------
api_keys:
  - organization_id: 12340000-0000-4000-8000-000000000000
    keys:
      - f70603aa00e6f67999cc66e336134887

# ---------------------------------------------------------------------------
# Container images. Each can be overridden via *Image parameters on the root.
# The migrator runs from the same image as the lakerunner tasks (LakerunnerImage)
# so the two cannot drift; any change to LakerunnerImage retriggers migrations.
# ---------------------------------------------------------------------------
images:
  lakerunner: "public.ecr.aws/cardinalhq.io/lakerunner:v1.67.1@sha256:81bab9db5bd71c484a23b1e7bb93e6831f54454bbf1e5fb03255620cd4a2e4c0"
  maestro:    "public.ecr.aws/cardinalhq.io/maestro:v1.72.1@sha256:7561d6281483bffbe2b41d42679165a191056e4cb4555261bebd7f8abddfdda3"
  otel:       "public.ecr.aws/cardinalhq.io/cardinalhq-otel-collector:v1.8.0@sha256:9906eea2b38f1614047ada60ce7887704652484bb5b01a7f8a1d932277e1f151"
  dex:        "public.ecr.aws/cardinalhq.io/dex-customization:v0.4.0@sha256:c85811b3a82b1574063971ce79126886607fbc82a1f9d777587fc4895ce18b7b"
  db_init:    "public.ecr.aws/docker/library/postgres:18-alpine@sha256:96d56f7f57c6aacd1fcb908bc83b345ec5f83231ee486dd66a1baadce274db88"
  # aws-cli: used only by the cardinal-cleanup teardown task (sh + aws + jq);
  # never part of a running install. Official AWS image on public ECR.
  aws_cli:    "public.ecr.aws/aws-cli/aws-cli:2.34.63@sha256:c95ab0642137f55a12b95b6956dd03cefdbd73e760e0e7b870afc9b47f9c8150"

# ---------------------------------------------------------------------------
# Capacity for the autoscaled lakerunner scale-out workers (process-logs,
# process-metrics, process-traces, query-worker). One build-time knob:
#   "ondemand" - pure on-demand FARGATE; disables Spot on the lakerunner side (default).
#   "fallback" - Base=1 on-demand FARGATE + FARGATE_SPOT scale-out.
# Deploy-critical singletons (query-api, control, maestro, pubsub-sqs,
# migrator) and the collector are always on-demand and ignore this knob.
# ---------------------------------------------------------------------------
lakerunner_capacity: ondemand

# ---------------------------------------------------------------------------
# Lakerunner microservices. Each entry's tier (query / process / control) is
# determined by which services-*.yaml child stack owns it; this file does not
# encode the tier mapping (the generators do).
# ---------------------------------------------------------------------------
services:
  lakerunner-pubsub-sqs:
    signal_type: common
    command: ["/app/bin/lakerunner", "pubsub", "sqs"]
    cpu: 1024
    memory_mib: 2048
    replicas: 1
    health_check:
      type: "go"
      command: ["/app/bin/lakerunner", "sysinfo"]
    environment: {}

  lakerunner-process-logs:
    signal_type: logs
    command: ["/app/bin/lakerunner", "process-logs"]
    cpu: 1024
    memory_mib: 4096
    autoscaling:
      min_replicas: 1
      max_replicas: 10
      cpu_target_percent: 50
    health_check:
      type: "go"
      command: ["/app/bin/lakerunner", "sysinfo"]
    environment:
      LAKERUNNER_PROCESSING_LOGS_COMPACT_TARGET_FILE_SIZE: "2097152"

  lakerunner-process-metrics:
    signal_type: metrics
    command: ["/app/bin/lakerunner", "process-metrics"]
    cpu: 1024
    memory_mib: 4096
    autoscaling:
      min_replicas: 1
      max_replicas: 10
      cpu_target_percent: 50
    health_check:
      type: "go"
      command: ["/app/bin/lakerunner", "sysinfo"]
    environment:
      LAKERUNNER_PROCESSING_METRICS_COMPACT_TARGET_FILE_SIZE: "2097152"

  lakerunner-process-traces:
    signal_type: traces
    command: ["/app/bin/lakerunner", "process-traces"]
    cpu: 1024
    memory_mib: 2048
    autoscaling:
      min_replicas: 1
      max_replicas: 10
      cpu_target_percent: 50
    health_check:
      type: "go"
      command: ["/app/bin/lakerunner", "sysinfo"]
    environment:
      LAKERUNNER_PROCESSING_TRACES_COMPACT_TARGET_FILE_SIZE: "2097152"

  lakerunner-sweeper:
    signal_type: common
    command: ["/app/bin/lakerunner", "sweeper"]
    health_check:
      type: "go"
      command: ["/app/bin/lakerunner", "sysinfo"]
    environment: {}

  lakerunner-query-api:
    signal_type: common
    command: ["/app/bin/lakerunner", "query-api"]
    cpu: 1024
    memory_mib: 2048
    replicas: 2
    ingress:
      port: 7101
      container_port: 8080
      attach_alb: true
      health_check_path: "/healthz"
      health_check_port: 8090
    health_check:
      type: "go"
      command: ["/app/bin/lakerunner", "sysinfo"]
    environment: {}

  lakerunner-query-worker:
    signal_type: common
    command: ["/app/bin/lakerunner", "query-worker"]
    cpu: 4096
    memory_mib: 8192
    replicas: 4
    ingress:
      port: 8082
      description: "From Query API (gRPC control stream)"
    health_check:
      type: "go"
      command: ["/app/bin/lakerunner", "sysinfo"]
    ephemeral_storage_gib: 100
    environment:
      LAKERUNNER_QUERY_DISABLE_TABLE_CACHE: "true"
      LAKERUNNER_QUERY_MAX_SEGMENTS_PER_WORKER_PER_WAVE: "100"

  lakerunner-monitoring:
    signal_type: common
    command: ["/app/bin/lakerunner", "monitoring", "serve"]
    health_check:
      type: "go"
      command: ["/app/bin/lakerunner", "sysinfo"]
    environment: {}

  lakerunner-admin-api:
    signal_type: common
    command: ["/app/bin/lakerunner", "admin-api", "serve"]
    ingress:
      port: 9091
      container_port: 9091
      attach_alb: true
      protocol: HTTP
      health_check_path: "/healthz"
    health_check:
      type: "go"
      command: ["/app/bin/lakerunner", "sysinfo"]
    environment: {}

  lakerunner-alert-evaluator:
    signal_type: common
    command: ["/app/bin/lakerunner", "alert-evaluator"]
    health_check:
      type: "go"
      command: ["/app/bin/lakerunner", "sysinfo"]
    environment: {}

# ---------------------------------------------------------------------------
# Maestro task and bundled DEX OIDC.
# ---------------------------------------------------------------------------
maestro:
  task:
    cpu: 1024
    memory_mib: 2048
  ports:
    maestro: 4200
    mcp_gateway: 8080
    mcp_gateway_debug: 9090
    alb_listener: 80
    dex: 5556
  dex:
    path_prefix: "/dex"
    client_id: "maestro-ui"

# ---------------------------------------------------------------------------
# OTEL collector.
# ---------------------------------------------------------------------------
otel:
  otel-gateway:
    # The image's run-with-env-config wrapper writes the YAML from the
    # CHQ_COLLECTOR_CONFIG_YAML env var (set by otel.py) to /tmp and runs
    # the collector against it.
    command: ["/app/bin/run-with-env-config"]
    cpu: 1024
    memory_mib: 2048
    replicas: 1
    environment:
      OTEL_RESOURCE_ATTRIBUTES: "service.name=otel-gateway"
