name: release

on:
  push:
    tags:
      - "v*"

permissions:
  id-token: write
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      # us-east-1 is the source-of-truth publishing bucket. Replication
      # populates cardinal-cfn-us-east-2 (and any other regional mirror)
      # at the S3 level, out of band from this workflow.
      AWS_REGION: us-east-1
      CARDINAL_BUCKET_NAME: cardinal-cfn-us-east-1
      CARDINAL_BUCKET_REGION: us-east-1
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install -r requirements.txt

      - name: Determine version
        id: version
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          echo "version=${REF_NAME}" >> "$GITHUB_OUTPUT"
          if [[ "${REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Build templates with version baked in
        env:
          CARDINAL_VERSION: ${{ steps.version.outputs.version }}
        run: |
          source .venv/bin/activate
          ./build.sh

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::992382549843:role/cardinal-cfn-publisher
          aws-region: ${{ env.AWS_REGION }}

      - name: Publish version
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          aws s3 sync generated-templates/ \
            "s3://${CARDINAL_BUCKET_NAME}/lakerunner/${VERSION}/" --delete

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
          PRERELEASE: ${{ steps.version.outputs.prerelease }}
        run: |
          ROOT_URL="https://${CARDINAL_BUCKET_NAME}.s3.${CARDINAL_BUCKET_REGION}.amazonaws.com/lakerunner/${VERSION}/cardinal-lakerunner.yaml"
          PRERELEASE_FLAG=()
          if [[ "${PRERELEASE}" == "true" ]]; then
            PRERELEASE_FLAG=(--prerelease)
          fi
          gh release create "$VERSION" \
            --title "$VERSION" \
            "${PRERELEASE_FLAG[@]}" \
            --notes "**Lakerunner root template:** $ROOT_URL

          Paste the root URL into the CloudFormation console to deploy."
