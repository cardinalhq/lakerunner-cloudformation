Conditions:
  EnableAlarms: !Not
    - !Equals
      - !Ref 'AlertTopicArn'
      - ''
  EnableOtlp: !Not
    - !Equals
      - !Ref 'OtelEndpoint'
      - ''
  InjectAdminInitialKey: !Equals
    - !Ref 'EnableAdminInitialKey'
    - 'Yes'
  IsInternetFacing: !Equals
    - !Ref 'AlbScheme'
    - internet-facing
Description: 'Lakerunner Services: ECS services, task definitions, IAM roles, and ALB integration'
Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: Infrastructure
        Parameters:
          - CommonInfraStackName
          - AlbScheme
          - EnableAdminInitialKey
      - Label:
          default: Query Services Configuration
        Parameters:
          - QueryApiReplicas
          - QueryApiCpu
          - QueryApiMemory
          - QueryWorkerReplicas
          - QueryWorkerCpu
          - QueryWorkerMemory
      - Label:
          default: Process Services Configuration
        Parameters:
          - ProcessLogsReplicas
          - ProcessLogsMemory
          - ProcessMetricsReplicas
          - ProcessMetricsMemory
          - ProcessTracesReplicas
          - ProcessTracesMemory
      - Label:
          default: Other Services Configuration
        Parameters:
          - PubsubSqsReplicas
          - AlertEvaluatorReplicas
      - Label:
          default: Telemetry
        Parameters:
          - OtelEndpoint
      - Label:
          default: Alerting
        Parameters:
          - AlertTopicArn
    ParameterLabels:
      AlbScheme:
        default: ALB Scheme
      AlertEvaluatorReplicas:
        default: Alert Evaluator Replicas
      AlertTopicArn:
        default: Alert SNS Topic ARN
      CommonInfraStackName:
        default: Common Infra Stack Name
      EnableAdminInitialKey:
        default: Enable Admin Bootstrap Key
      OtelEndpoint:
        default: OTEL Collector Endpoint
      ProcessLogsMemory:
        default: Process Logs Memory (MiB)
      ProcessLogsReplicas:
        default: Process Logs Max Replicas
      ProcessMetricsMemory:
        default: Process Metrics Memory (MiB)
      ProcessMetricsReplicas:
        default: Process Metrics Max Replicas
      ProcessTracesMemory:
        default: Process Traces Memory (MiB)
      ProcessTracesReplicas:
        default: Process Traces Max Replicas
      PubsubSqsReplicas:
        default: Pubsub Sqs Replicas
      QueryApiCpu:
        default: Query Api CPU
      QueryApiMemory:
        default: Query Api Memory (MiB)
      QueryApiReplicas:
        default: Query Api Replicas
      QueryWorkerCpu:
        default: Query Worker CPU
      QueryWorkerMemory:
        default: Query Worker Memory (MiB)
      QueryWorkerReplicas:
        default: Query Worker Replicas
Outputs:
  AdminApiURL:
    Description: Admin API URL (HTTP on port 9091)
    Export:
      Name: !Sub '${AWS::StackName}-AdminApiURL'
    Value: !Sub
      - http://${AlbDns}:9091
      - AlbDns: !GetAtt 'Alb.DNSName'
  AlbArn:
    Export:
      Name: !Sub '${AWS::StackName}-AlbArn'
    Value: !Ref 'Alb'
  AlbDNS:
    Export:
      Name: !Sub '${AWS::StackName}-AlbDNS'
    Value: !GetAtt 'Alb.DNSName'
  ExecutionRoleArn:
    Export:
      Name: !Sub '${AWS::StackName}-ExecutionRoleArn'
    Value: !GetAtt 'ExecRole.Arn'
  ServiceLakerunnerAdminApiArn:
    Export:
      Name: !Sub '${AWS::StackName}-lakerunner-admin-api-ServiceArn'
    Value: !Ref 'ServiceLakerunnerAdminApi'
  ServiceLakerunnerAlertEvaluatorArn:
    Export:
      Name: !Sub '${AWS::StackName}-lakerunner-alert-evaluator-ServiceArn'
    Value: !Ref 'ServiceLakerunnerAlertEvaluator'
  ServiceLakerunnerMonitoringArn:
    Export:
      Name: !Sub '${AWS::StackName}-lakerunner-monitoring-ServiceArn'
    Value: !Ref 'ServiceLakerunnerMonitoring'
  ServiceLakerunnerProcessLogsArn:
    Export:
      Name: !Sub '${AWS::StackName}-lakerunner-process-logs-ServiceArn'
    Value: !Ref 'ServiceLakerunnerProcessLogs'
  ServiceLakerunnerProcessMetricsArn:
    Export:
      Name: !Sub '${AWS::StackName}-lakerunner-process-metrics-ServiceArn'
    Value: !Ref 'ServiceLakerunnerProcessMetrics'
  ServiceLakerunnerProcessTracesArn:
    Export:
      Name: !Sub '${AWS::StackName}-lakerunner-process-traces-ServiceArn'
    Value: !Ref 'ServiceLakerunnerProcessTraces'
  ServiceLakerunnerPubsubSqsArn:
    Export:
      Name: !Sub '${AWS::StackName}-lakerunner-pubsub-sqs-ServiceArn'
    Value: !Ref 'ServiceLakerunnerPubsubSqs'
  ServiceLakerunnerQueryApiArn:
    Export:
      Name: !Sub '${AWS::StackName}-lakerunner-query-api-ServiceArn'
    Value: !Ref 'ServiceLakerunnerQueryApi'
  ServiceLakerunnerQueryWorkerArn:
    Export:
      Name: !Sub '${AWS::StackName}-lakerunner-query-worker-ServiceArn'
    Value: !Ref 'ServiceLakerunnerQueryWorker'
  ServiceLakerunnerSweeperArn:
    Export:
      Name: !Sub '${AWS::StackName}-lakerunner-sweeper-ServiceArn'
    Value: !Ref 'ServiceLakerunnerSweeper'
  TaskRoleArn:
    Export:
      Name: !Sub '${AWS::StackName}-TaskRoleArn'
    Value: !GetAtt 'TaskRole.Arn'
  Tg7101Arn:
    Export:
      Name: !Sub '${AWS::StackName}-Tg7101Arn'
    Value: !Ref 'Tg7101'
Parameters:
  AlbScheme:
    AllowedValues:
      - internet-facing
      - internal
    Default: internal
    Description: 'Load balancer scheme: ''internet-facing'' for external access or ''internal'' for internal access only.'
    Type: String
  AlertEvaluatorReplicas:
    Default: '1'
    Description: Number of lakerunner-alert-evaluator task replicas
    MinValue: 1
    Type: Number
  AlertTopicArn:
    Default: ''
    Description: 'OPTIONAL: SNS Topic ARN for CloudWatch alarms. Leave blank to disable task count alarms. Deploy the Alerting stack first to create a topic.'
    Type: String
  CommonInfraStackName:
    Description: 'REQUIRED: Name of the CommonInfra stack to import infrastructure values from.'
    Type: String
  EnableAdminInitialKey:
    AllowedValues:
      - 'Yes'
      - 'No'
    Default: 'Yes'
    Description: Inject the bootstrap admin API key into admin-api. Set to No after creating permanent keys.
    Type: String
  OtelEndpoint:
    Default: ''
    Description: 'OPTIONAL: OTEL collector HTTP endpoint URL (e.g., http://collector-dns:4318). Leave blank to disable OTLP telemetry export.'
    Type: String
  ProcessLogsMemory:
    AllowedValues:
      - '2048'
      - '3072'
      - '4096'
      - '5120'
      - '6144'
      - '7168'
      - '8192'
    Default: '2048'
    Description: 'Memory (MiB) for lakerunner-process-logs. Valid values for 1024 CPU: 2048, 3072, 4096, 5120, 6144, 7168, 8192'
    Type: Number
  ProcessLogsReplicas:
    Default: '10'
    Description: Maximum number of lakerunner-process-logs tasks (scaled by monitoring service)
    MaxValue: 50
    MinValue: 1
    Type: Number
  ProcessMetricsMemory:
    AllowedValues:
      - '2048'
      - '3072'
      - '4096'
      - '5120'
      - '6144'
      - '7168'
      - '8192'
    Default: '2048'
    Description: 'Memory (MiB) for lakerunner-process-metrics. Valid values for 1024 CPU: 2048, 3072, 4096, 5120, 6144, 7168, 8192'
