Conditions:
  IsInternetFacing: !Equals
    - !Ref 'AlbScheme'
    - internet-facing
Description: 'Lakerunner Grafana: Grafana with pre-configured plugins, PostgreSQL storage, and ALB. The Cardinal datasource is wired to the Query API.'
Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: Infrastructure
        Parameters:
          - CommonInfraStackName
          - QueryApiUrl
          - AlbScheme
      - Label:
          default: Datasource
        Parameters:
          - LakerunnerApiKey
      - Label:
          default: Grafana Maintenance
        Parameters:
          - GrafanaResetToken
    ParameterLabels:
      AlbScheme:
        default: ALB Scheme
      CommonInfraStackName:
        default: Common Infra Stack Name
      GrafanaResetToken:
        default: Grafana Reset Token
      LakerunnerApiKey:
        default: Lakerunner API Key
      QueryApiUrl:
        default: Query API URL
Outputs:
  GrafanaAdminSecretArn:
    Description: 'ARN of the Grafana admin password secret. Use AWS CLI to retrieve: aws secretsmanager get-secret-value --secret-id <ARN>'
    Export:
      Name: !Sub '${AWS::StackName}-GrafanaAdminSecretArn'
    Value: !Ref 'GrafanaSecret'
  GrafanaAlbArn:
    Export:
      Name: !Sub '${AWS::StackName}-AlbArn'
    Value: !Ref 'GrafanaAlb'
  GrafanaAlbDNS:
    Export:
      Name: !Sub '${AWS::StackName}-AlbDNS'
    Value: !GetAtt 'GrafanaAlb.DNSName'
  GrafanaServiceArn:
    Export:
      Name: !Sub '${AWS::StackName}-ServiceArn'
    Value: !Ref 'GrafanaService'
  GrafanaUrl:
    Description: URL to access Grafana dashboard
    Value: !Sub
      - http://${GrafanaAlbDns}:3000
      - GrafanaAlbDns: !GetAtt 'GrafanaAlb.DNSName'
Parameters:
  AlbScheme:
    AllowedValues:
      - internet-facing
      - internal
    Default: internal
    Description: 'Load balancer scheme: ''internet-facing'' for external access or ''internal'' for internal access only.'
    Type: String
  CommonInfraStackName:
    Description: 'REQUIRED: Name of the CommonInfra stack to import infrastructure values from.'
    Type: String
  GrafanaResetToken:
    Default: change-to-reset-grafana
    Description: Reset token for Grafana data wipe. Changing this value will wipe all Grafana data on next deployment.
    Type: String
  LakerunnerApiKey:
    Default: f70603aa00e6f67999cc66e336134887
    Description: API key injected into the Cardinal datasource's secureJsonData.
    Type: String
  QueryApiUrl:
    Description: 'REQUIRED: Full URL to the Query API endpoint (e.g., http://alb-dns-name.region.elb.amazonaws.com:7101)'
    Type: String
Resources:
  GrafanaAlb:
    Properties:
      Scheme: !Ref 'AlbScheme'
      SecurityGroups:
        - !Ref 'GrafanaAlbSecurityGroup'
      Subnets: !If
        - IsInternetFacing
        - !Split
          - ','
          - !ImportValue
            Fn::Sub:
              - ${CommonInfraStackName}-PublicSubnets
              - CommonInfraStackName: !Ref 'CommonInfraStackName'
        - !Split
          - ','
          - !ImportValue
            Fn::Sub:
              - ${CommonInfraStackName}-PrivateSubnets
              - CommonInfraStackName: !Ref 'CommonInfraStackName'
      Type: application
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
  GrafanaAlb3000Open:
    Properties:
      CidrIp: '0.0.0.0/0'
      Description: HTTP 3000 for Grafana
      FromPort: 3000
      GroupId: !Ref 'GrafanaAlbSecurityGroup'
      IpProtocol: tcp
      ToPort: 3000
    Type: AWS::EC2::SecurityGroupIngress
  GrafanaAlbSecurityGroup:
    Properties:
      GroupDescription: Security group for Grafana ALB
      SecurityGroupEgress:
        - CidrIp: '0.0.0.0/0'
          Description: Allow all outbound
          IpProtocol: '-1'
      VpcId: !ImportValue
        Fn::Sub:
          - ${CommonInfraStackName}-VpcId
          - CommonInfraStackName: !Ref 'CommonInfraStackName'
    Type: AWS::EC2::SecurityGroup
  GrafanaDatasourceConfig:
    Properties:
      Description: Grafana datasource configuration for Cardinal plugin
      Name: !Sub '${AWS::StackName}-grafana-datasource-config'
      Type: String
      Value: !Sub
        - |
          apiVersion: 1
          datasources:
          - access: proxy
            editable: true
            isDefault: true
            jsonData:
              customPath: ${QUERY_API_URL}
            name: Cardinal
            secureJsonData:
              apiKey: ${LAKERUNNER_API_KEY}
            type: cardinalhq-lakerunner-datasource
        - LAKERUNNER_API_KEY: !Ref 'LakerunnerApiKey'
          QUERY_API_URL: !Ref 'QueryApiUrl'
    Type: AWS::SSM::Parameter
  GrafanaDbSecret:
    Properties:
      Description: Grafana database user password
      GenerateSecretString:
        ExcludeCharacters: ' !"#$%&''()*+,./:;<=>?@[\]^`{|}~'
        GenerateStringKey: password
        PasswordLength: 32
        SecretStringTemplate: '{"username": "grafana"}'
      Name: !Sub '${AWS::StackName}-grafana-db'
    Type: AWS::SecretsManager::Secret
  GrafanaExecRole:
    Properties:
      AssumeRolePolicyDocument:
        Statement:
          - Action: sts:AssumeRole
            Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
        Version: '2012-10-17'
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy
      Policies:
        - PolicyDocument:
            Statement:
              - Action:
                  - ssm:GetParameter
                  - ssm:GetParameters
                Effect: Allow
                Resource:
                  - !Sub 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/${AWS::StackName}-*'
              - Action:
                  - ssmmessages:CreateControlChannel
                  - ssmmessages:CreateDataChannel
                  - ssmmessages:OpenControlChannel
                  - ssmmessages:OpenDataChannel
                Effect: Allow
                Resource: '*'
              - Action:
                  - secretsmanager:GetSecretValue
                Effect: Allow
                Resource:
                  - !Sub 'arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${AWS::StackName}-*'
                  - !Sub
                    - ${DbSecretArn}*
                    - DbSecretArn: !ImportValue
                        Fn::Sub:
                          - ${CommonInfraStackName}-DbSecretArn
                          - CommonInfraStackName: !Ref 'CommonInfraStackName'
            Version: '2012-10-17'
          PolicyName: SSMParameterAccess
      RoleName: !Sub '${AWS::StackName}-exec-role'
    Type: AWS::IAM::Role
  GrafanaListener:
    Properties:
      DefaultActions:
        - TargetGroupArn: !Ref 'GrafanaTg'
          Type: forward
      LoadBalancerArn: !Ref 'GrafanaAlb'
      Port: '3000'
      Protocol: HTTP
    Type: AWS::ElasticLoadBalancingV2::Listener
  GrafanaLogGroup:
    Properties:
      LogGroupName: !Sub '/ecs/${AWS::StackName}/grafana'
      RetentionInDays: 14
    Type: AWS::Logs::LogGroup
  GrafanaSecret:
    Properties:
      Description: Grafana admin password
      GenerateSecretString:
        ExcludeCharacters: ' !"#$%&''()*+,./:;<=>?@[\]^`{|}~'
        GenerateStringKey: password
        PasswordLength: 32
        SecretStringTemplate: '{"username": "lakerunner"}'
      Name: !Sub '${AWS::StackName}-grafana-admin'
    Type: AWS::SecretsManager::Secret
  GrafanaService:
    DependsOn:
      - GrafanaListener
    Properties:
      Cluster: !ImportValue
        Fn::Sub:
          - ${CommonInfraStackName}-ClusterArn
          - CommonInfraStackName: !Ref 'CommonInfraStackName'
      DesiredCount: '1'
      EnableECSManagedTags: true
      EnableExecuteCommand: true
      LaunchType: FARGATE
      LoadBalancers:
        - ContainerName: GrafanaContainer
          ContainerPort: 3000
          TargetGroupArn: !Ref 'GrafanaTg'
      NetworkConfiguration:
        AwsvpcConfiguration:
          SecurityGroups:
            - !ImportValue
              Fn::Sub:
                - ${CommonInfraStackName}-TaskSGId
                - CommonInfraStackName: !Ref 'CommonInfraStackName'
          Subnets: !Split
            - ','
            - !ImportValue
              Fn::Sub:
                - ${CommonInfraStackName}-PrivateSubnets
                - CommonInfraStackName: !Ref 'CommonInfraStackName'
      PropagateTags: SERVICE
      ServiceName: !Sub '${AWS::StackName}-grafana'
      Tags:
        - Key: Component
          Value: Service
        - Key: Environment
          Value: !Ref 'AWS::StackName'
        - Key: ManagedBy
          Value: Lakerunner
        - Key: Name
          Value: !Sub '${AWS::StackName}-grafana'
      TaskDefinition: !Ref 'GrafanaTaskDef'
    Type: AWS::ECS::Service
  GrafanaTaskDef:
    Properties:
      ContainerDefinitions:
        - Environment:
            - Name: GRAFANA_DB_NAME
              Value: grafana
            - Name: GRAFANA_DB_USER
              Value: grafana
            - Name: PGHOST
              Value: !ImportValue
                Fn::Sub:
                  - ${CommonInfraStackName}-DbEndpoint
                  - CommonInfraStackName: !Ref 'CommonInfraStackName'
            - Name: PGPORT
              Value: !ImportValue
                Fn::Sub:
                  - ${CommonInfraStackName}-DbPort
                  - CommonInfraStackName: !Ref 'CommonInfraStackName'
            - Name: PGDATABASE
              Value: postgres
            - Name: PGSSLMODE
              Value: require
            - Name: RESET_TOKEN
              Value: !Ref 'GrafanaResetToken'
            - Name: GF_SECURITY_ADMIN_USER
              Value: lakerunner
          Essential: false
          Image: ghcr.io/cardinalhq/initcontainer-grafana:latest
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref 'GrafanaLogGroup'
              awslogs-region: !Ref 'AWS::Region'
              awslogs-stream-prefix: grafana-init
          Name: GrafanaInit
          Secrets:
            - Name: PGUSER
              ValueFrom: !Sub
                - '${DbSecretArn}:username::'
                - DbSecretArn: !ImportValue
                    Fn::Sub:
                      - ${CommonInfraStackName}-DbSecretArn
                      - CommonInfraStackName: !Ref 'CommonInfraStackName'
            - Name: PGPASSWORD
              ValueFrom: !Sub
                - '${DbSecretArn}:password::'
                - DbSecretArn: !ImportValue
                    Fn::Sub:
                      - ${CommonInfraStackName}-DbSecretArn
                      - CommonInfraStackName: !Ref 'CommonInfraStackName'
            - Name: GRAFANA_DB_PASSWORD
              ValueFrom: !Sub
                - '${SecretArn}:password::'
                - SecretArn: !Ref 'GrafanaDbSecret'
            - Name: GF_SECURITY_ADMIN_PASSWORD
              ValueFrom: !Sub
                - '${SecretArn}:password::'
                - SecretArn: !Ref 'GrafanaSecret'
        - DependsOn:
            - Condition: SUCCESS
              ContainerName: GrafanaInit
          Environment:
            - Name: BUMP_REVISION
              Value: '1'
            - Name: OTEL_SERVICE_NAME
              Value: grafana
            - Name: TMPDIR
              Value: /scratch
            - Name: HOME
              Value: /scratch
            - Name: GF_DATABASE_HOST
              Value: !ImportValue
                Fn::Sub:
                  - ${CommonInfraStackName}-DbEndpoint
                  - CommonInfraStackName: !Ref 'CommonInfraStackName'
            - Name: GF_DATABASE_PORT
              Value: !ImportValue
                Fn::Sub:
                  - ${CommonInfraStackName}-DbPort
                  - CommonInfraStackName: !Ref 'CommonInfraStackName'
            - Name: GF_DATABASE_NAME
              Value: grafana
            - Name: GF_DATABASE_USER
              Value: grafana
            - Name: GF_SECURITY_ADMIN_USER
              Value: lakerunner
            - Name: GF_SERVER_HTTP_PORT
              Value: '3000'
            - Name: GF_SERVER_ROOT_URL
              Value: '%(protocol)s://%(domain)s:%(http_port)s'
            - Name: GF_PLUGINS_PREINSTALL_SYNC
              Value: >-
                cardinalhq-lakerunner-datasource@2.4.3@https://github.com/cardinalhq/cardinalhq-lakerunner-datasource/releases/download/v2.4.3/cardinalhq-lakerunner-datasource.zip,cardinalhq-cardinal-app@0.3.4@https://github.com/cardinalhq/cardinalhq-cardinal-app/releases/download/v0.3.4/cardinalhq-cardinal-app.zip
            - Name: GF_PLUGINS_ALLOW_LOADING_UNSIGNED_PLUGINS
              Value: cardinalhq-lakerunner-datasource,cardinalhq-cardinal-app
            - Name: GF_PATHS_PROVISIONING
              Value: /etc/grafana/provisioning
            - Name: GF_DATABASE_TYPE
              Value: postgres
            - Name: GF_DATABASE_SSL_MODE
              Value: require
          Essential: true
          HealthCheck:
            Command:
              - CMD-SHELL
              - curl -f http://localhost:3000/api/health
            Interval: 30
            Retries: 3
            StartPeriod: 60
            Timeout: 5
          Image: grafana/grafana:latest
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref 'GrafanaLogGroup'
              awslogs-region: !Ref 'AWS::Region'
              awslogs-stream-prefix: grafana
          MountPoints:
            - ContainerPath: /scratch
              ReadOnly: false
              SourceVolume: scratch
          Name: GrafanaContainer
          PortMappings:
            - ContainerPort: 3000
              Protocol: tcp
          Secrets:
            - Name: GF_SECURITY_ADMIN_PASSWORD
              ValueFrom: !Sub
                - '${SecretArn}:password::'
                - SecretArn: !Ref 'GrafanaSecret'
            - Name: GF_DATABASE_PASSWORD
              ValueFrom: !Sub
                - '${SecretArn}:password::'
                - SecretArn: !Ref 'GrafanaDbSecret'
            - Name: GRAFANA_DATASOURCE_CONFIG
              ValueFrom: !Ref 'GrafanaDatasourceConfig'
          User: '0'
      Cpu: '2048'
      ExecutionRoleArn: !GetAtt 'GrafanaExecRole.Arn'
      Family: !Sub '${AWS::StackName}-grafana-ai'
      Memory: '4096'
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      RuntimePlatform:
        CpuArchitecture: ARM64
        OperatingSystemFamily: LINUX
      TaskRoleArn: !GetAtt 'GrafanaTaskRole.Arn'
      Volumes:
        - Name: scratch
    Type: AWS::ECS::TaskDefinition
  GrafanaTaskRole:
    Properties:
      AssumeRolePolicyDocument:
        Statement:
          - Action: sts:AssumeRole
            Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
        Version: '2012-10-17'
      Policies:
        - PolicyDocument:
            Statement:
              - Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Effect: Allow
                Resource: '*'
            Version: '2012-10-17'
          PolicyName: LogAccess
      RoleName: !Sub '${AWS::StackName}-task-role'
    Type: AWS::IAM::Role
  GrafanaTg:
    Properties:
      HealthCheckIntervalSeconds: 30
      HealthCheckPath: /api/health
      HealthCheckProtocol: HTTP
      HealthCheckTimeoutSeconds: 5
      HealthyThresholdCount: 2
      Matcher:
        HttpCode: '200'
      Name: !If
        - IsInternetFacing
        - !Sub '${AWS::StackName}-ext'
        - !Sub '${AWS::StackName}-int'
      Port: 3000
      Protocol: HTTP
      TargetGroupAttributes:
        - Key: stickiness.enabled
          Value: 'false'
        - Key: deregistration_delay.timeout_seconds
          Value: '30'
      TargetType: ip
      UnhealthyThresholdCount: 3
      VpcId: !ImportValue
        Fn::Sub:
          - ${CommonInfraStackName}-VpcId
          - CommonInfraStackName: !Ref 'CommonInfraStackName'
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
  TaskFromGrafanaAlb3000:
    Properties:
      Description: Grafana ALB to tasks 3000
      FromPort: 3000
      GroupId: !ImportValue
        Fn::Sub:
          - ${CommonInfraStackName}-TaskSGId
          - CommonInfraStackName: !Ref 'CommonInfraStackName'
      IpProtocol: tcp
      SourceSecurityGroupId: !Ref 'GrafanaAlbSecurityGroup'
      ToPort: 3000
    Type: AWS::EC2::SecurityGroupIngress

