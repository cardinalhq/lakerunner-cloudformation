# OTEL Collector Configuration

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

  # Secondary OTLP receiver for CloudWatch metrics path
  otlp/cloudwatch:
    protocols:
      http:
        endpoint: 0.0.0.0:4319

processors:
  memory_limiter:
    limit_mib: 1024
    check_interval: 1s

  batch:
    timeout: 10s
    send_batch_max_size: 10000
    send_batch_size: 10000

  batch/cloudwatch:
    timeout: 10s
    send_batch_max_size: 1000
    send_batch_size: 100

  # Filter to only keep lakerunner.* metrics for CloudWatch
  filter/lakerunner:
    metrics:
      include:
        match_type: regexp
        metric_names:
          - ^lakerunner\..*

exporters:
  awss3/logs:
    s3uploader:
      region: ${env:AWS_REGION}
      s3_bucket: ${env:AWS_S3_BUCKET}
      s3_prefix: otel-raw/${env:ORG}/${env:COLLECTOR}
      s3_force_path_style: true
      s3_partition_format: 'year=%Y/month=%m/day=%d/hour=%H/minute=%M'
      compression: gzip
    marshaler: otlp_proto

  awss3/metrics:
    s3uploader:
      region: ${env:AWS_REGION}
      s3_bucket: ${env:AWS_S3_BUCKET}
      s3_prefix: otel-raw/${env:ORG}/${env:COLLECTOR}
      s3_force_path_style: true
      s3_partition_format: 'year=%Y/month=%m/day=%d/hour=%H/minute=%M'
      compression: gzip
    marshaler: otlp_proto

  awss3/traces:
    s3uploader:
      region: ${env:AWS_REGION}
      s3_bucket: ${env:AWS_S3_BUCKET}
      s3_prefix: otel-raw/${env:ORG}/${env:COLLECTOR}
      s3_force_path_style: true
      s3_partition_format: 'year=%Y/month=%m/day=%d/hour=%H/minute=%M'
      compression: gzip
    marshaler: otlp_proto

  nop:

  # CloudWatch metrics exporter for secondary path
  awsemf/cloudwatch:
    namespace: ${env:CLOUDWATCH_NAMESPACE}
    region: ${env:AWS_REGION}
    log_group_name: ${env:CLOUDWATCH_LOG_GROUP}
    log_stream_name: otel-metrics
    dimension_rollup_option: NoDimensionRollup

extensions:
  health_check:
    endpoint: 0.0.0.0:13133

service:
  extensions:
    - health_check
  pipelines:
    traces:
      receivers:
        - otlp
        - otlp/cloudwatch
      processors:
        - memory_limiter
        - batch
      exporters:
        - awss3/traces

    metrics:
      receivers:
        - otlp
        - otlp/cloudwatch
      processors:
        - memory_limiter
        - batch
      exporters:
        - awss3/metrics

    logs:
      receivers:
        - otlp
        - otlp/cloudwatch
      processors:
        - memory_limiter
        - batch
      exporters:
        - awss3/logs

    # Secondary pipeline for CloudWatch metrics (port 4319)
    # Only lakerunner.* metrics go to CloudWatch
    metrics/cloudwatch:
      receivers:
        - otlp/cloudwatch
      processors:
        - memory_limiter
        - filter/lakerunner
        - batch/cloudwatch
      exporters:
        - awsemf/cloudwatch
