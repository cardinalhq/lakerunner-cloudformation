# Grafana configuration for Lakerunner deployment
# This file contains configuration for Grafana, MCP Gateway, and Conductor Server

# Database configuration (used by Setup stack)
database:
  name: "lakerunner_grafana"
  user: "grafana"

# Container Images configuration
images:
  grafana: "grafana/grafana:latest"
  grafana_init: "ghcr.io/cardinalhq/initcontainer-grafana:latest"
  mcp_gateway: "ghcr.io/cardinalhq/mcp-gateway:v0.2.0"
  conductor_server: "ghcr.io/cardinalhq/conductor-server:v0.1.7"

# Task-level resource allocation (shared by all containers)
task:
  cpu: 2048
  memory_mib: 4096

# Grafana service configuration
grafana:
  replicas: 1
  ingress:
    port: 3000
    health_check_path: "/api/health"
  environment:
    GF_SECURITY_ADMIN_USER: "lakerunner"
    GF_SECURITY_ADMIN_PASSWORD: "from_secret"
    GF_SERVER_HTTP_PORT: "3000"
    GF_SERVER_ROOT_URL: "%(protocol)s://%(domain)s:%(http_port)s"
    GF_INSTALL_PLUGINS: "https://github.com/cardinalhq/cardinalhq-lakerunner-datasource/releases/download/v2.4.0/cardinalhq-lakerunner-datasource.zip;cardinalhq-lakerunner-datasource,https://github.com/cardinalhq/cardinalhq-cardinal-app/releases/download/v0.1.8/cardinalhq-cardinal-app.zip;cardinalhq-cardinal-app"
    GF_PATHS_PROVISIONING: "/etc/grafana/provisioning"
    GF_SECURITY_ALLOW_EMBEDDING: "true"
    # PostgreSQL database configuration
    GF_DATABASE_TYPE: "postgres"
    GF_DATABASE_SSL_MODE: "require"
  database:
    type: "postgres"
    ssl_mode: "require"
  health_check:
    type: "curl"
    command: ["curl", "-f", "http://localhost:3000/api/health"]

# MCP Gateway configuration (sidecar container)
mcp_gateway:
  port: 8080
  environment:
    HOME: "/tmp"
    AWS_REGION: "us-east-1"

# Conductor Server configuration (sidecar container)
conductor_server:
  port: 4100
  environment:
    MCP_GATEWAY_URL: "http://localhost:8080"

# API Keys configuration (for datasource setup)
api_keys:
  - organization_id: 12340000-0000-4000-8000-000000000000
    keys:
      - f70603aa00e6f67999cc66e336134887
