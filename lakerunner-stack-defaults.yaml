# Default configuration for core Lakerunner deployment
# This file contains configuration for the main three stacks: common, migration, and services

# API Keys configuration
api_keys:
  - organization_id: 12340000-0000-4000-8000-000000000000
    keys:
      - f70603aa00e6f67999cc66e336134887

# Storage Profiles configuration
storage_profiles:
  - bucket: "${BUCKET_NAME}"  # Will be replaced with actual bucket name
    cloud_provider: aws
    collector_name: lakerunner
    insecure_tls: false
    instance_num: 1
    organization_id: 12340000-0000-4000-8000-000000000000
    region: "${AWS_REGION}"  # Will be replaced with actual region
    use_path_style: true

# Container Images configuration
images:
  lakerunner: "ghcr.io/cardinalhq/lakerunner:v1.18.1"

# Service configurations for core Lakerunner services
services:
  lakerunner-pubsub-sqs:
    signal_type: common
    command: ["/app/bin/lakerunner", "pubsub", "sqs"]
    cpu: 1024
    memory_mib: 2048
    replicas: 1
    health_check:
      type: "go"
      command: ["/app/bin/lakerunner", "sysinfo"]
    environment: {}

  lakerunner-process-logs:
    signal_type: logs
    command: ["/app/bin/lakerunner", "process-logs"]
    cpu: 1024
    memory_mib: 2048
    autoscaling:
      min_replicas: 1
      max_replicas: 10
    health_check:
      type: "go"
      command: ["/app/bin/lakerunner", "sysinfo"]
    environment: {}

  lakerunner-process-metrics:
    signal_type: metrics
    command: ["/app/bin/lakerunner", "process-metrics"]
    cpu: 1024
    memory_mib: 2048
    autoscaling:
      min_replicas: 1
      max_replicas: 10
    health_check:
      type: "go"
      command: ["/app/bin/lakerunner", "sysinfo"]
    environment: {}

  lakerunner-process-traces:
    signal_type: traces
    command: ["/app/bin/lakerunner", "process-traces"]
    cpu: 1024
    memory_mib: 2048
    autoscaling:
      min_replicas: 1
      max_replicas: 10
    health_check:
      type: "go"
      command: ["/app/bin/lakerunner", "sysinfo"]
    environment: {}

  lakerunner-sweeper:
    signal_type: common
    command: ["/app/bin/lakerunner", "sweeper"]
    cpu: 256
    memory_mib: 512
    replicas: 1
    health_check:
      type: "go"
      command: ["/app/bin/lakerunner", "sysinfo"]
    environment: {}

  lakerunner-query-api:
    signal_type: common
    command: ["/app/bin/lakerunner", "query-api"]
    cpu: 1024
    memory_mib: 2048
    replicas: 2
    ingress:
      port: 7101
      container_port: 8080
      attach_alb: true
      health_check_path: "/healthz"
      health_check_port: 8090
    health_check:
      type: "go"
      command: ["/app/bin/lakerunner", "sysinfo"]
    environment:
      EXECUTION_ENVIRONMENT: "ecs"
      QUERY_WORKER_SERVICE_NAME: "lakerunner-query-worker"
      # Note: QUERY_WORKER_CLUSTER_NAME is set dynamically in the template

  lakerunner-query-worker:
    signal_type: common
    command: ["/app/bin/lakerunner", "query-worker"]
    cpu: 4096
    memory_mib: 8192
    replicas: 8
    ingress:
      port: 8081
      description: "From Query API"
    health_check:
      type: "go"
      command: ["/app/bin/lakerunner", "sysinfo"]
    ephemeral_storage_gib: 100
    environment:
      LAKERUNNER_QUERY_DISABLE_TABLE_CACHE: "true"
      LAKERUNNER_QUERY_MAX_SEGMENTS_PER_WORKER_PER_WAVE: "100"

  # Monitoring service
  lakerunner-monitoring:
    signal_type: common
    command: ["/app/bin/lakerunner", "monitoring", "serve", "--grpc-port=9090"]
    cpu: 256
    memory_mib: 512
    replicas: 1
    ingress:
      port: 9090
      container_port: 9090
      attach_alb: false
    health_check:
      type: "go"
      command: ["/app/bin/lakerunner", "sysinfo"]
    environment: {}

  # Admin API service
  lakerunner-admin-api:
    signal_type: common
    command: ["/app/bin/lakerunner", "admin-api", "serve"]
    cpu: 256
    memory_mib: 512
    replicas: 1
    ingress:
      port: 9091
      container_port: 9091
      attach_alb: true
      protocol: HTTP
      health_check_path: "/healthz"
    health_check:
      type: "go"
      command: ["/app/bin/lakerunner", "sysinfo"]
    environment: {}

  # Notification Sender service
  lakerunner-notification-sender:
    signal_type: common
    command: ["/app/bin/lakerunner", "notification-sender"]
    cpu: 256
    memory_mib: 512
    replicas: 1
    health_check:
      type: "go"
      command: ["/app/bin/lakerunner", "sysinfo"]
    environment: {}

  # Alert Evaluator service
  lakerunner-alert-evaluator:
    signal_type: common
    command: ["/app/bin/lakerunner", "alert-evaluator"]
    cpu: 256
    memory_mib: 512
    replicas: 1
    health_check:
      type: "go"
      command: ["/app/bin/lakerunner", "sysinfo"]
    environment: {}
