  TaskDefLakerunnerAdminApi:
    Properties:
      ContainerDefinitions:
        - Command:
            - /app/bin/lakerunner
            - admin-api
            - serve
          Environment:
            - Name: OTEL_SERVICE_NAME
              Value: lakerunner-admin-api
            - Name: TMPDIR
              Value: /scratch
            - Name: HOME
              Value: /scratch
            - Name: STORAGE_PROFILE_FILE
              Value: env:STORAGE_PROFILES_ENV
            - Name: API_KEYS_FILE
              Value: env:API_KEYS_ENV
            - Name: SQS_QUEUE_URL
              Value: !ImportValue
                Fn::Sub:
                  - ${CommonInfraStackName}-QueueUrl
                  - CommonInfraStackName: !Ref 'CommonInfraStackName'
            - Name: SQS_REGION
              Value: !Ref 'AWS::Region'
            - Name: LRDB_HOST
              Value: !ImportValue
                Fn::Sub:
                  - ${CommonInfraStackName}-DbEndpoint
                  - CommonInfraStackName: !Ref 'CommonInfraStackName'
            - Name: LRDB_PORT
              Value: !ImportValue
                Fn::Sub:
                  - ${CommonInfraStackName}-DbPort
                  - CommonInfraStackName: !Ref 'CommonInfraStackName'
            - Name: LRDB_DBNAME
              Value: lakerunner
            - Name: LRDB_USER
              Value: lakerunner
            - Name: LRDB_SSLMODE
              Value: require
            - Name: CONFIGDB_HOST
              Value: !ImportValue
                Fn::Sub:
                  - ${CommonInfraStackName}-DbEndpoint
                  - CommonInfraStackName: !Ref 'CommonInfraStackName'
            - Name: CONFIGDB_PORT
              Value: !ImportValue
                Fn::Sub:
                  - ${CommonInfraStackName}-DbPort
                  - CommonInfraStackName: !Ref 'CommonInfraStackName'
            - Name: CONFIGDB_DBNAME
              Value: lakerunner
            - Name: CONFIGDB_USER
              Value: lakerunner
            - Name: CONFIGDB_SSLMODE
              Value: require
            - Name: LICENSE_FILE
              Value: env:LICENSE_DATA
            - Name: SOFT_LICENSE_CHECK
              Value: 'true'
            - Name: OTEL_METRIC_EXPORT_INTERVAL
              Value: '10000'
            - Name: OTEL_TRACES_SAMPLER
              Value: parentbased_traceidratio
            - Name: OTEL_TRACES_SAMPLER_ARG
              Value: '0.01'
            - Name: OTEL_EXPORTER_OTLP_ENDPOINT
              Value: !If
                - EnableOtlp
                - !Ref 'OtelEndpoint'
                - !Ref 'AWS::NoValue'
            - Name: ENABLE_OTLP_TELEMETRY
              Value: !If
                - EnableOtlp
                - 'true'
                - !Ref 'AWS::NoValue'
            - Name: QUERY_API_URL
              Value: !Sub
                - http://${AlbDns}:7101
                - AlbDns: !GetAtt 'Alb.DNSName'
            - Name: GOMEMLIMIT
              Value: 384MiB
            - Name: GOGC
              Value: '50'
            - Name: ADMIN_INITIAL_API_KEY
              Value: !If
                - InjectAdminInitialKey
                - !Sub
                  - '{{resolve:secretsmanager:${SecretArn}}}'
                  - SecretArn: !ImportValue
                      Fn::Sub:
                        - ${CommonInfraStackName}-AdminInitialAPIKeySecretArn
                        - CommonInfraStackName: !Ref 'CommonInfraStackName'
                - ''
          HealthCheck:
            Command:
              - /app/bin/lakerunner
              - sysinfo
            Interval: 30
            Retries: 3
            StartPeriod: 60
            Timeout: 5
          Image: ghcr.io/cardinalhq/lakerunner:v1.18.1
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref 'LogGroupLakerunnerAdminApi'
              awslogs-region: !Ref 'AWS::Region'
              awslogs-stream-prefix: lakerunner-admin-api
          MountPoints:
            - ContainerPath: /scratch
              ReadOnly: false
              SourceVolume: scratch
          Name: AppContainer
          PortMappings:
            - ContainerPort: 9091
              Protocol: tcp
          Secrets:
            - Name: STORAGE_PROFILES_ENV
              ValueFrom: !Sub
                - arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/lakerunner/${CommonInfraStackName}/storage_profiles
                - CommonInfraStackName: !Ref 'CommonInfraStackName'
            - Name: API_KEYS_ENV
              ValueFrom: !Sub
                - arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/lakerunner/${CommonInfraStackName}/api_keys
                - CommonInfraStackName: !Ref 'CommonInfraStackName'
            - Name: LICENSE_DATA
              ValueFrom: !Sub
                - arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/lakerunner/${CommonInfraStackName}/license
                - CommonInfraStackName: !Ref 'CommonInfraStackName'
            - Name: LRDB_PASSWORD
              ValueFrom: !Sub
                - '${SecretArn}:password::'
                - SecretArn: !ImportValue
                    Fn::Sub:
                      - ${CommonInfraStackName}-DbSecretArn
