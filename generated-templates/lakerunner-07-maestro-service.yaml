Conditions:
  IsInternetFacing: !Equals
    - !Ref 'AlbScheme'
    - internet-facing
Description: 'Lakerunner Maestro + MCP Gateway: single ECS Fargate service with a stack-local ALB. Reuses CommonInfra RDS and runs a psql init container that creates the maestro DB and user.'
Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: Infrastructure
        Parameters:
          - CommonInfraStackName
          - AlbScheme
      - Label:
          default: Task Sizing
        Parameters:
          - TaskCpu
          - TaskMemoryMiB
      - Label:
          default: Image
        Parameters:
          - MaestroImage
      - Label:
          default: OIDC (optional)
        Parameters:
          - OidcIssuerUrl
          - OidcAudience
          - OidcSuperadminGroup
          - OidcJwksUrl
          - OidcSuperadminEmails
          - OidcTrustUnverifiedEmails
      - Label:
          default: Misc
        Parameters:
          - MaestroBaseUrl
    ParameterLabels:
      AlbScheme:
        default: ALB Scheme
      CommonInfraStackName:
        default: Common Infra Stack Name
      MaestroBaseUrl:
        default: Maestro Base URL
      MaestroImage:
        default: Maestro Image
      OidcAudience:
        default: OIDC Audience / UI client_id
      OidcIssuerUrl:
        default: OIDC Issuer URL
      OidcJwksUrl:
        default: OIDC JWKS URL
      OidcSuperadminEmails:
        default: OIDC Superadmin Emails
      OidcSuperadminGroup:
        default: OIDC Superadmin Group
      OidcTrustUnverifiedEmails:
        default: OIDC Trust Unverified Emails
      TaskCpu:
        default: Fargate CPU
      TaskMemoryMiB:
        default: Fargate Memory (MiB)
Outputs:
  MaestroAlbArn:
    Export:
      Name: !Sub '${AWS::StackName}-MaestroAlbArn'
    Value: !Ref 'MaestroAlb'
  MaestroAlbDNS:
    Export:
      Name: !Sub '${AWS::StackName}-MaestroAlbDNS'
    Value: !GetAtt 'MaestroAlb.DNSName'
  MaestroDbSecretArn:
    Export:
      Name: !Sub '${AWS::StackName}-MaestroDbSecretArn'
    Value: !Ref 'MaestroDbSecret'
  MaestroServiceArn:
    Export:
      Name: !Sub '${AWS::StackName}-MaestroServiceArn'
    Value: !Ref 'MaestroService'
  MaestroUrl:
    Description: URL to access the Maestro UI/API
    Value: !Sub
      - http://${Dns}
      - Dns: !GetAtt 'MaestroAlb.DNSName'
Parameters:
  AlbScheme:
    AllowedValues:
      - internet-facing
      - internal
    Default: internal
    Description: 'Load balancer scheme: ''internet-facing'' for external access or ''internal'' for internal access only.'
    Type: String
  CommonInfraStackName:
    Description: 'REQUIRED: Name of the CommonInfra stack to import values from.'
    Type: String
  MaestroBaseUrl:
    Default: ''
    Description: Optional public base URL for Maestro (forwarded as MAESTRO_BASE_URL). Leave blank to let the UI infer.
    Type: String
  MaestroImage:
    Default: public.ecr.aws/cardinalhq.io/maestro:v0.23.0
    Description: Container image for both Maestro and the MCP Gateway (same image, different entrypoints).
    Type: String
  OidcAudience:
    Default: maestro-ui
    Description: OIDC audience. Also used as the web UI OAuth client_id.
    Type: String
  OidcIssuerUrl:
    Default: ''
    Description: OIDC issuer URL. Leave blank to disable OIDC (Maestro treats an empty value as 'OIDC disabled').
    Type: String
  OidcJwksUrl:
    Default: ''
    Description: Optional OIDC JWKS URL override. Leave blank to use the issuer's well-known JWKS endpoint.
    Type: String
  OidcSuperadminEmails:
    Default: ''
    Description: Optional comma-separated email allowlist granted superadmin access via OIDC.
    Type: String
  OidcSuperadminGroup:
    Default: maestro-superadmin
    Description: OIDC group name that grants Maestro superadmin access.
    Type: String
  OidcTrustUnverifiedEmails:
    AllowedValues:
      - 'true'
      - 'false'
    Default: 'false'
    Description: When 'true', treat all OIDC emails as verified. Leave 'false' unless you understand the security implications.
    Type: String
  TaskCpu:
    Default: '1024'
    Description: Fargate CPU units for the Maestro task (e.g., 512/1024/2048).
    Type: String
  TaskMemoryMiB:
    Default: '2048'
    Description: Fargate memory (MiB) for the Maestro task.
    Type: String
Resources:
  MaestroAlb:
    Properties:
      Scheme: !Ref 'AlbScheme'
      SecurityGroups:
        - !Ref 'MaestroAlbSecurityGroup'
      Subnets: !If
        - IsInternetFacing
        - !Split
          - ','
          - !ImportValue
            Fn::Sub:
              - ${CommonInfraStackName}-PublicSubnets
              - CommonInfraStackName: !Ref 'CommonInfraStackName'
        - !Split
          - ','
          - !ImportValue
            Fn::Sub:
              - ${CommonInfraStackName}-PrivateSubnets
              - CommonInfraStackName: !Ref 'CommonInfraStackName'
      Type: application
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
  MaestroAlbListenerIngress:
    Properties:
      CidrIp: '0.0.0.0/0'
      Description: HTTP 80 for Maestro ALB
      FromPort: 80
      GroupId: !Ref 'MaestroAlbSecurityGroup'
      IpProtocol: tcp
      ToPort: 80
    Type: AWS::EC2::SecurityGroupIngress
  MaestroAlbSecurityGroup:
    Properties:
      GroupDescription: Security group for Maestro ALB
      SecurityGroupEgress:
        - CidrIp: '0.0.0.0/0'
          Description: Allow all outbound
          IpProtocol: '-1'
      VpcId: !ImportValue
        Fn::Sub:
          - ${CommonInfraStackName}-VpcId
          - CommonInfraStackName: !Ref 'CommonInfraStackName'
    Type: AWS::EC2::SecurityGroup
  MaestroDbInitLogGroup:
    Properties:
      LogGroupName: !Sub '/ecs/${AWS::StackName}/db-init'
      RetentionInDays: 14
    Type: AWS::Logs::LogGroup
  MaestroDbSecret:
    Properties:
      Description: Maestro PostgreSQL user password
      GenerateSecretString:
        ExcludeCharacters: ' !"#$%&''()*+,./:;<=>?@[\]^`{|}~'
        GenerateStringKey: password
        PasswordLength: 32
        SecretStringTemplate: '{"username":"maestro"}'
      Name: !Sub '${AWS::StackName}-maestro-db'
    Type: AWS::SecretsManager::Secret
  MaestroExecRole:
    Properties:
      AssumeRolePolicyDocument:
        Statement:
          - Action: sts:AssumeRole
            Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
        Version: '2012-10-17'
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy
      Policies:
        - PolicyDocument:
            Statement:
              - Action:
                  - secretsmanager:GetSecretValue
                Effect: Allow
                Resource:
                  - !Sub 'arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${AWS::StackName}-*'
                  - !Sub
                    - ${S}*
                    - S: !ImportValue
                        Fn::Sub:
                          - ${CommonInfraStackName}-DbSecretArn
                          - CommonInfraStackName: !Ref 'CommonInfraStackName'
            Version: '2012-10-17'
          PolicyName: SecretsManagerAccess
      RoleName: !Sub '${AWS::StackName}-exec-role'
    Type: AWS::IAM::Role
  MaestroListener:
    Properties:
      DefaultActions:
        - TargetGroupArn: !Ref 'MaestroTg'
          Type: forward
      LoadBalancerArn: !Ref 'MaestroAlb'
      Port: '80'
      Protocol: HTTP
    Type: AWS::ElasticLoadBalancingV2::Listener
  MaestroMcpGatewayLogGroup:
    Properties:
      LogGroupName: !Sub '/ecs/${AWS::StackName}/mcp-gateway'
      RetentionInDays: 14
    Type: AWS::Logs::LogGroup
  MaestroServerLogGroup:
    Properties:
      LogGroupName: !Sub '/ecs/${AWS::StackName}/maestro'
      RetentionInDays: 14
    Type: AWS::Logs::LogGroup
  MaestroService:
    DependsOn:
      - MaestroListener
    Properties:
      Cluster: !ImportValue
        Fn::Sub:
          - ${CommonInfraStackName}-ClusterArn
          - CommonInfraStackName: !Ref 'CommonInfraStackName'
      DesiredCount: 1
      EnableECSManagedTags: true
      EnableExecuteCommand: true
      LaunchType: FARGATE
      LoadBalancers:
        - ContainerName: Maestro
          ContainerPort: 4200
          TargetGroupArn: !Ref 'MaestroTg'
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: DISABLED
          SecurityGroups:
            - !ImportValue
              Fn::Sub:
                - ${CommonInfraStackName}-TaskSGId
                - CommonInfraStackName: !Ref 'CommonInfraStackName'
          Subnets: !Split
            - ','
            - !ImportValue
              Fn::Sub:
                - ${CommonInfraStackName}-PrivateSubnets
                - CommonInfraStackName: !Ref 'CommonInfraStackName'
      PropagateTags: SERVICE
      ServiceName: !Sub '${AWS::StackName}-maestro'
      Tags:
        - Key: Component
          Value: Service
        - Key: Environment
          Value: !Ref 'AWS::StackName'
        - Key: ManagedBy
          Value: Lakerunner
        - Key: Name
          Value: !Sub '${AWS::StackName}-maestro'
      TaskDefinition: !Ref 'MaestroTaskDef'
    Type: AWS::ECS::Service
  MaestroTaskDef:
    Properties:
      ContainerDefinitions:
        - Environment:
            - Name: PGHOST
              Value: !ImportValue
                Fn::Sub:
                  - ${CommonInfraStackName}-DbEndpoint
                  - CommonInfraStackName: !Ref 'CommonInfraStackName'
            - Name: PGPORT
              Value: !ImportValue
                Fn::Sub:
                  - ${CommonInfraStackName}-DbPort
                  - CommonInfraStackName: !Ref 'CommonInfraStackName'
            - Name: PGDATABASE
              Value: postgres
            - Name: PGSSLMODE
              Value: require
            - Name: GRAFANA_DB_NAME
              Value: maestro
            - Name: GRAFANA_DB_USER
              Value: maestro
          Essential: false
          Image: ghcr.io/cardinalhq/initcontainer-grafana:latest
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref 'MaestroDbInitLogGroup'
              awslogs-region: !Ref 'AWS::Region'
              awslogs-stream-prefix: db-init
          Name: DbInit
          Secrets:
            - Name: PGUSER
              ValueFrom: !Sub
                - '${S}:username::'
                - S: !ImportValue
                    Fn::Sub:
                      - ${CommonInfraStackName}-DbSecretArn
                      - CommonInfraStackName: !Ref 'CommonInfraStackName'
            - Name: PGPASSWORD
              ValueFrom: !Sub
                - '${S}:password::'
                - S: !ImportValue
                    Fn::Sub:
                      - ${CommonInfraStackName}-DbSecretArn
                      - CommonInfraStackName: !Ref 'CommonInfraStackName'
            - Name: GRAFANA_DB_PASSWORD
              ValueFrom: !Sub
                - '${S}:password::'
                - S: !Ref 'MaestroDbSecret'
        - Command:
            - /app/entrypoint.sh
            - mcp-gateway
          DependsOn:
            - Condition: SUCCESS
              ContainerName: DbInit
          Environment:
            - Name: MAESTRO_DB_HOST
              Value: !ImportValue
                Fn::Sub:
                  - ${CommonInfraStackName}-DbEndpoint
                  - CommonInfraStackName: !Ref 'CommonInfraStackName'
            - Name: MAESTRO_DB_PORT
              Value: !ImportValue
                Fn::Sub:
                  - ${CommonInfraStackName}-DbPort
                  - CommonInfraStackName: !Ref 'CommonInfraStackName'
            - Name: MAESTRO_DB_NAME
              Value: maestro
            - Name: MAESTRO_DB_USER
              Value: maestro
            - Name: MAESTRO_DB_SSLMODE
              Value: require
            - Name: MAESTRO_DATABASE_URL
              Value: postgresql://$(MAESTRO_DB_USER):$(MAESTRO_DB_PASSWORD)@$(MAESTRO_DB_HOST):$(MAESTRO_DB_PORT)/$(MAESTRO_DB_NAME)?sslmode=$(MAESTRO_DB_SSLMODE)
            - Name: MCP_PORT
              Value: '8080'
            - Name: MCP_DEBUG_PORT
              Value: '9090'
          Essential: true
          HealthCheck:
            Command:
              - CMD-SHELL
              - wget --no-verbose --tries=1 --spider http://localhost:8080/healthz || exit 1
            Interval: 30
            Retries: 3
            StartPeriod: 30
            Timeout: 5
          Image: !Ref 'MaestroImage'
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref 'MaestroMcpGatewayLogGroup'
              awslogs-region: !Ref 'AWS::Region'
              awslogs-stream-prefix: mcp-gateway
          Name: McpGateway
          PortMappings:
            - ContainerPort: 8080
              Protocol: tcp
            - ContainerPort: 9090
              Protocol: tcp
          ReadonlyRootFilesystem: true
          Secrets:
            - Name: MAESTRO_DB_PASSWORD
              ValueFrom: !Sub
                - '${S}:password::'
                - S: !Ref 'MaestroDbSecret'
          User: '65532'
        - DependsOn:
            - Condition: SUCCESS
              ContainerName: DbInit
            - Condition: HEALTHY
              ContainerName: McpGateway
          Environment:
            - Name: MAESTRO_DB_HOST
              Value: !ImportValue
                Fn::Sub:
                  - ${CommonInfraStackName}-DbEndpoint
                  - CommonInfraStackName: !Ref 'CommonInfraStackName'
            - Name: MAESTRO_DB_PORT
              Value: !ImportValue
                Fn::Sub:
                  - ${CommonInfraStackName}-DbPort
                  - CommonInfraStackName: !Ref 'CommonInfraStackName'
            - Name: MAESTRO_DB_NAME
              Value: maestro
            - Name: MAESTRO_DB_USER
              Value: maestro
            - Name: MAESTRO_DB_SSLMODE
              Value: require
            - Name: MAESTRO_DATABASE_URL
              Value: postgresql://$(MAESTRO_DB_USER):$(MAESTRO_DB_PASSWORD)@$(MAESTRO_DB_HOST):$(MAESTRO_DB_PORT)/$(MAESTRO_DB_NAME)?sslmode=$(MAESTRO_DB_SSLMODE)
            - Name: MCP_GATEWAY_URL
              Value: http://localhost:8080
            - Name: PORT
              Value: '4200'
            - Name: MAESTRO_BASE_URL
              Value: !Ref 'MaestroBaseUrl'
            - Name: OIDC_ISSUER_URL
              Value: !Ref 'OidcIssuerUrl'
            - Name: OIDC_AUDIENCE
              Value: !Ref 'OidcAudience'
            - Name: OIDC_SUPERADMIN_GROUP
              Value: !Ref 'OidcSuperadminGroup'
            - Name: OIDC_JWKS_URL
              Value: !Ref 'OidcJwksUrl'
            - Name: OIDC_SUPERADMIN_EMAILS
              Value: !Ref 'OidcSuperadminEmails'
            - Name: OIDC_TRUST_UNVERIFIED_EMAILS
              Value: !Ref 'OidcTrustUnverifiedEmails'
          Essential: true
          HealthCheck:
            Command:
              - CMD-SHELL
              - wget --no-verbose --tries=1 --spider http://localhost:4200/api/health || exit 1
            Interval: 30
            Retries: 3
            StartPeriod: 60
            Timeout: 5
          Image: !Ref 'MaestroImage'
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref 'MaestroServerLogGroup'
              awslogs-region: !Ref 'AWS::Region'
              awslogs-stream-prefix: maestro
          MountPoints:
            - ContainerPath: /tmp
              ReadOnly: false
              SourceVolume: tmp
          Name: Maestro
          PortMappings:
            - ContainerPort: 4200
              Protocol: tcp
          ReadonlyRootFilesystem: true
          Secrets:
            - Name: MAESTRO_DB_PASSWORD
              ValueFrom: !Sub
                - '${S}:password::'
                - S: !Ref 'MaestroDbSecret'
          User: '65532'
      Cpu: !Ref 'TaskCpu'
      ExecutionRoleArn: !GetAtt 'MaestroExecRole.Arn'
      Family: !Sub '${AWS::StackName}-maestro'
      Memory: !Ref 'TaskMemoryMiB'
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      RuntimePlatform:
        CpuArchitecture: ARM64
        OperatingSystemFamily: LINUX
      TaskRoleArn: !GetAtt 'MaestroTaskRole.Arn'
      Volumes:
        - Name: tmp
    Type: AWS::ECS::TaskDefinition
  MaestroTaskFromAlbIngress:
    Properties:
      Description: Maestro ALB -> task port 4200
      FromPort: 4200
      GroupId: !ImportValue
        Fn::Sub:
          - ${CommonInfraStackName}-TaskSGId
          - CommonInfraStackName: !Ref 'CommonInfraStackName'
      IpProtocol: tcp
      SourceSecurityGroupId: !Ref 'MaestroAlbSecurityGroup'
      ToPort: 4200
    Type: AWS::EC2::SecurityGroupIngress
  MaestroTaskRole:
    Properties:
      AssumeRolePolicyDocument:
        Statement:
          - Action: sts:AssumeRole
            Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
        Version: '2012-10-17'
      Policies:
        - PolicyDocument:
            Statement:
              - Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Effect: Allow
                Resource: '*'
            Version: '2012-10-17'
          PolicyName: LogAccess
      RoleName: !Sub '${AWS::StackName}-task-role'
    Type: AWS::IAM::Role
  MaestroTg:
    Properties:
      HealthCheckIntervalSeconds: 30
      HealthCheckPath: /api/health
      HealthCheckProtocol: HTTP
      HealthCheckTimeoutSeconds: 5
      HealthyThresholdCount: 2
      Matcher:
        HttpCode: '200'
      Name: !If
        - IsInternetFacing
        - !Sub '${AWS::StackName}-ext'
        - !Sub '${AWS::StackName}-int'
      Port: 4200
      Protocol: HTTP
      TargetGroupAttributes:
        - Key: stickiness.enabled
          Value: 'false'
        - Key: deregistration_delay.timeout_seconds
          Value: '30'
      TargetType: ip
      UnhealthyThresholdCount: 3
      VpcId: !ImportValue
        Fn::Sub:
          - ${CommonInfraStackName}-VpcId
          - CommonInfraStackName: !Ref 'CommonInfraStackName'
    Type: AWS::ElasticLoadBalancingV2::TargetGroup

