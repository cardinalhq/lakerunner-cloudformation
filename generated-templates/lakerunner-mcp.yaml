Conditions:
  HasMcpApiKey: !Not
    - !Equals
      - !Ref 'McpApiKey'
      - ''
  IsInternetFacing: !Equals
    - !Ref 'AlbScheme'
    - internet-facing
Description: 'Lakerunner MCP Service: Standalone MCP server for Claude Code integration'
Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: Infrastructure
        Parameters:
          - CommonInfraStackName
          - AlbScheme
      - Label:
          default: Lakerunner Configuration
        Parameters:
          - LakerunnerEndpoint
          - LakerunnerApiKey
      - Label:
          default: MCP Configuration
        Parameters:
          - McpApiKey
      - Label:
          default: Container Images
        Parameters:
          - McpImage
    ParameterLabels:
      AlbScheme:
        default: ALB Scheme
      CommonInfraStackName:
        default: Common Infra Stack Name
      LakerunnerApiKey:
        default: Lakerunner API Key
      LakerunnerEndpoint:
        default: Lakerunner Endpoint URL
      McpApiKey:
        default: MCP API Key (Optional)
      McpImage:
        default: MCP Container Image
Outputs:
  BedrockPermissionsPolicy:
    Description: IAM policy document showing the Bedrock permissions granted to the task role
    Value: !Sub "{\n  \"Version\": \"2012-10-17\",\n  \"Statement\": [\n    {\n      \"Sid\": \"BedrockFullModelAccess\",\n      \"Effect\": \"Allow\",\n      \"Action\": [\n        \"bedrock:InvokeModel\"\
      ,\n        \"bedrock:InvokeModelWithResponseStream\"\n      ],\n      \"Resource\": [\n        \"arn:aws:bedrock:*::foundation-model/*\",\n        \"arn:aws:bedrock:*:ACCOUNT_ID:inference-profile/*\"\
      \n      ]\n    },\n    {\n      \"Sid\": \"MarketplaceSubscriptions\",\n      \"Effect\": \"Allow\",\n      \"Action\": [\n        \"aws-marketplace:ViewSubscriptions\",\n        \"aws-marketplace:Subscribe\"\
      \n      ],\n      \"Resource\": \"*\"\n    }\n  ]\n}"
  LocalApiUrl:
    Description: URL for OpenAI-compatible API endpoints (/openai/v1/chat/completions, /openai/v1/models)
    Value: !Sub
      - http://${McpAlbDns}:20202
      - McpAlbDns: !GetAtt 'McpAlb.DNSName'
  McpAlbArn:
    Export:
      Name: !Sub '${AWS::StackName}-AlbArn'
    Value: !Ref 'McpAlb'
  McpAlbDNS:
    Description: DNS name of the MCP load balancer
    Export:
      Name: !Sub '${AWS::StackName}-AlbDNS'
    Value: !GetAtt 'McpAlb.DNSName'
  McpServiceArn:
    Export:
      Name: !Sub '${AWS::StackName}-ServiceArn'
    Value: !Ref 'McpService'
  McpUrl:
    Description: URL to access MCP server (use this as SSE endpoint in Claude Code)
    Value: !Sub
      - http://${McpAlbDns}:8080/sse
      - McpAlbDns: !GetAtt 'McpAlb.DNSName'
  TaskRoleArn:
    Description: ARN of the ECS task role with Bedrock permissions
    Export:
      Name: !Sub '${AWS::StackName}-TaskRoleArn'
    Value: !GetAtt 'McpTaskRole.Arn'
Parameters:
  AlbScheme:
    AllowedValues:
      - internet-facing
      - internal
    Default: internal
    Description: 'Load balancer scheme: ''internet-facing'' for external access or ''internal'' for internal access only.'
    Type: String
  CommonInfraStackName:
    Description: 'REQUIRED: Name of the CommonInfra stack to import infrastructure values from.'
    Type: String
  LakerunnerApiKey:
    Default: f70603aa00e6f67999cc66e336134887
    Description: API key for accessing the Lakerunner API. Defaults to the standard demo key.
    Type: String
  LakerunnerEndpoint:
    Description: 'REQUIRED: Full URL to the Lakerunner endpoint (e.g., https://app.cardinalhq.io or http://alb-dns-name:7101)'
    Type: String
  McpApiKey:
    Default: ''
    Description: 'OPTIONAL: API key for MCP endpoint authentication. Leave blank to disable authentication.'
    Type: String
  McpImage:
    Default: public.ecr.aws/cardinalhq.io/lakerunner/standalone-mcp:latest
    Description: Container image for MCP service
    Type: String
Resources:
  LakerunnerApiKeySecret:
    Properties:
      Description: Lakerunner API key for MCP service
      Name: !Sub '${AWS::StackName}-lakerunner-api-key'
      SecretString: !Ref 'LakerunnerApiKey'
    Type: AWS::SecretsManager::Secret
  LocalApiListener:
    Properties:
      DefaultActions:
        - TargetGroupArn: !Ref 'LocalApiTg'
          Type: forward
      LoadBalancerArn: !Ref 'McpAlb'
      Port: '20202'
      Protocol: HTTP
    Type: AWS::ElasticLoadBalancingV2::Listener
  LocalApiTg:
    Properties:
      HealthCheckIntervalSeconds: 30
      HealthCheckPath: /health
      HealthCheckProtocol: HTTP
      HealthCheckTimeoutSeconds: 5
      HealthyThresholdCount: 2
      Matcher:
        HttpCode: '200'
      Port: 20202
      Protocol: HTTP
      TargetGroupAttributes:
        - Key: stickiness.enabled
          Value: 'false'
        - Key: deregistration_delay.timeout_seconds
          Value: '30'
      TargetType: ip
      UnhealthyThresholdCount: 3
      VpcId: !ImportValue
        Fn::Sub:
          - ${CommonInfraStackName}-VpcId
          - CommonInfraStackName: !Ref 'CommonInfraStackName'
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
  McpAlb:
    Properties:
      Scheme: !Ref 'AlbScheme'
      SecurityGroups:
        - !Ref 'McpAlbSecurityGroup'
      Subnets: !If
        - IsInternetFacing
        - !Split
          - ','
          - !ImportValue
            Fn::Sub:
              - ${CommonInfraStackName}-PublicSubnets
              - CommonInfraStackName: !Ref 'CommonInfraStackName'
        - !Split
          - ','
          - !ImportValue
            Fn::Sub:
              - ${CommonInfraStackName}-PrivateSubnets
              - CommonInfraStackName: !Ref 'CommonInfraStackName'
      Type: application
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
  McpAlb20202Open:
    Properties:
      CidrIp: '0.0.0.0/0'
      Description: HTTP 20202 for local-api
      FromPort: 20202
      GroupId: !Ref 'McpAlbSecurityGroup'
      IpProtocol: tcp
      ToPort: 20202
    Type: AWS::EC2::SecurityGroupIngress
  McpAlb8080Open:
    Properties:
      CidrIp: '0.0.0.0/0'
      Description: HTTP 8080 for MCP server
      FromPort: 8080
      GroupId: !Ref 'McpAlbSecurityGroup'
      IpProtocol: tcp
      ToPort: 8080
    Type: AWS::EC2::SecurityGroupIngress
  McpAlbSecurityGroup:
    Properties:
      GroupDescription: Security group for MCP ALB
      SecurityGroupEgress:
        - CidrIp: '0.0.0.0/0'
          Description: Allow all outbound
          IpProtocol: '-1'
      VpcId: !ImportValue
        Fn::Sub:
          - ${CommonInfraStackName}-VpcId
          - CommonInfraStackName: !Ref 'CommonInfraStackName'
    Type: AWS::EC2::SecurityGroup
  McpApiKeySecret:
    Condition: HasMcpApiKey
    Properties:
      Description: MCP API key for endpoint authentication
      Name: !Sub '${AWS::StackName}-mcp-api-key'
      SecretString: !Ref 'McpApiKey'
    Type: AWS::SecretsManager::Secret
  McpExecRole:
    Properties:
      AssumeRolePolicyDocument:
        Statement:
          - Action: sts:AssumeRole
            Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
        Version: '2012-10-17'
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy
      Policies:
        - PolicyDocument:
            Statement:
              - Action:
                  - secretsmanager:GetSecretValue
                Effect: Allow
                Resource:
                  - !Sub 'arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${AWS::StackName}-*'
              - Action:
                  - ssmmessages:CreateControlChannel
                  - ssmmessages:CreateDataChannel
                  - ssmmessages:OpenControlChannel
                  - ssmmessages:OpenDataChannel
                Effect: Allow
                Resource: '*'
            Version: '2012-10-17'
          PolicyName: SecretsAccess
      RoleName: !Sub '${AWS::StackName}-exec-role'
    Type: AWS::IAM::Role
  McpListener:
    Properties:
      DefaultActions:
        - TargetGroupArn: !Ref 'McpTg'
          Type: forward
      LoadBalancerArn: !Ref 'McpAlb'
      Port: '8080'
      Protocol: HTTP
    Type: AWS::ElasticLoadBalancingV2::Listener
  McpLogGroup:
    Properties:
      LogGroupName: !Sub '/ecs/${AWS::StackName}/mcp'
      RetentionInDays: 14
    Type: AWS::Logs::LogGroup
  McpService:
    DependsOn:
      - McpListener
      - LocalApiListener
    Properties:
      Cluster: !ImportValue
        Fn::Sub:
          - ${CommonInfraStackName}-ClusterArn
          - CommonInfraStackName: !Ref 'CommonInfraStackName'
      DesiredCount: '1'
      EnableECSManagedTags: true
      EnableExecuteCommand: true
      LaunchType: FARGATE
      LoadBalancers:
        - ContainerName: McpContainer
          ContainerPort: 8080
          TargetGroupArn: !Ref 'McpTg'
        - ContainerName: McpContainer
          ContainerPort: 20202
          TargetGroupArn: !Ref 'LocalApiTg'
      NetworkConfiguration:
        AwsvpcConfiguration:
          SecurityGroups:
            - !ImportValue
              Fn::Sub:
                - ${CommonInfraStackName}-TaskSGId
                - CommonInfraStackName: !Ref 'CommonInfraStackName'
          Subnets: !Split
            - ','
            - !ImportValue
              Fn::Sub:
                - ${CommonInfraStackName}-PrivateSubnets
                - CommonInfraStackName: !Ref 'CommonInfraStackName'
      PropagateTags: SERVICE
      ServiceName: !Sub '${AWS::StackName}-mcp'
      Tags:
        - Key: Component
          Value: Service
        - Key: Environment
          Value: !Ref 'AWS::StackName'
        - Key: ManagedBy
          Value: Lakerunner
        - Key: Name
          Value: !Sub '${AWS::StackName}-mcp'
      TaskDefinition: !Ref 'McpTaskDef'
    Type: AWS::ECS::Service
  McpTaskDef:
    Properties:
      ContainerDefinitions:
        - Environment:
            - Name: LAKERUNNER_API_URL
              Value: !Ref 'LakerunnerEndpoint'
            - Name: HOME
              Value: /tmp
            - Name: MCP_TRANSPORT
              Value: http
            - Name: AWS_REGION
              Value: us-east-1
          HealthCheck:
            Command:
              - CMD-SHELL
              - wget --no-verbose --tries=1 --spider http://localhost:20202/health || exit 1
            Interval: 30
            Retries: 3
            StartPeriod: 30
            Timeout: 5
          Image: !Ref 'McpImage'
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref 'McpLogGroup'
              awslogs-region: !Ref 'AWS::Region'
              awslogs-stream-prefix: mcp
          Name: McpContainer
          PortMappings:
            - ContainerPort: 8080
              Protocol: tcp
            - ContainerPort: 20202
              Protocol: tcp
          Secrets:
            - Name: LAKERUNNER_API_KEY
              ValueFrom: !Ref 'LakerunnerApiKeySecret'
          User: '65532'
      Cpu: '512'
      ExecutionRoleArn: !GetAtt 'McpExecRole.Arn'
      Family: !Sub '${AWS::StackName}-mcp-task'
      Memory: '1024'
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      RuntimePlatform:
        CpuArchitecture: ARM64
        OperatingSystemFamily: LINUX
      TaskRoleArn: !GetAtt 'McpTaskRole.Arn'
      Volumes:
        - Name: scratch
    Type: AWS::ECS::TaskDefinition
  McpTaskRole:
    Properties:
      AssumeRolePolicyDocument:
        Statement:
          - Action: sts:AssumeRole
            Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
        Version: '2012-10-17'
      Policies:
        - PolicyDocument:
            Statement:
              - Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Effect: Allow
                Resource: '*'
            Version: '2012-10-17'
          PolicyName: LogAccess
        - PolicyDocument:
            Statement:
              - Action:
                  - bedrock:InvokeModel
                  - bedrock:InvokeModelWithResponseStream
                Effect: Allow
                Resource:
                  - arn:aws:bedrock:*::foundation-model/*
                  - !Sub 'arn:aws:bedrock:*:${AWS::AccountId}:inference-profile/*'
              - Action:
                  - aws-marketplace:ViewSubscriptions
                  - aws-marketplace:Subscribe
                Effect: Allow
                Resource: '*'
            Version: '2012-10-17'
          PolicyName: BedrockAccess
      RoleName: !Sub '${AWS::StackName}-task-role'
    Type: AWS::IAM::Role
  McpTg:
    Properties:
      HealthCheckIntervalSeconds: 30
      HealthCheckPath: /health
      HealthCheckPort: '20202'
      HealthCheckProtocol: HTTP
      HealthCheckTimeoutSeconds: 5
      HealthyThresholdCount: 2
      Matcher:
        HttpCode: '200'
      Port: 8080
      Protocol: HTTP
      TargetGroupAttributes:
        - Key: stickiness.enabled
          Value: 'false'
        - Key: deregistration_delay.timeout_seconds
          Value: '30'
      TargetType: ip
      UnhealthyThresholdCount: 3
      VpcId: !ImportValue
        Fn::Sub:
          - ${CommonInfraStackName}-VpcId
          - CommonInfraStackName: !Ref 'CommonInfraStackName'
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
  TaskFromMcpAlb20202:
    Properties:
      Description: MCP ALB to tasks 20202 (health check)
      FromPort: 20202
      GroupId: !ImportValue
        Fn::Sub:
          - ${CommonInfraStackName}-TaskSGId
          - CommonInfraStackName: !Ref 'CommonInfraStackName'
      IpProtocol: tcp
      SourceSecurityGroupId: !Ref 'McpAlbSecurityGroup'
      ToPort: 20202
    Type: AWS::EC2::SecurityGroupIngress
  TaskFromMcpAlb8080:
    Properties:
      Description: MCP ALB to tasks 8080
      FromPort: 8080
      GroupId: !ImportValue
        Fn::Sub:
          - ${CommonInfraStackName}-TaskSGId
          - CommonInfraStackName: !Ref 'CommonInfraStackName'
      IpProtocol: tcp
      SourceSecurityGroupId: !Ref 'McpAlbSecurityGroup'
      ToPort: 8080
    Type: AWS::EC2::SecurityGroupIngress

