      - '5120'
      - '6144'
      - '7168'
      - '8192'
    Default: '2048'
    Description: 'Memory (MiB) for lakerunner-process-traces. Valid values for 1024 CPU: 2048, 3072, 4096, 5120, 6144, 7168, 8192'
    Type: Number
  ProcessTracesReplicas:
    Default: '10'
    Description: Maximum number of lakerunner-process-traces tasks (scaled by monitoring service)
    MaxValue: 50
    MinValue: 1
    Type: Number
  PubsubSqsReplicas:
    Default: '1'
    Description: Number of lakerunner-pubsub-sqs task replicas
    MinValue: 1
    Type: Number
  QueryApiCpu:
