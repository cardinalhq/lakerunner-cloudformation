Conditions:
  CreateAlarmLakerunnerAdminApi: !And
    - !Condition 'EnableAlarms'
    - !Condition 'EnableAdminApi'
  CreateAlarmLakerunnerAlertEvaluator: !And
    - !Condition 'EnableAlarms'
    - !Condition 'EnableAlertEvaluator'
  CreateAlarmLakerunnerCompactLogs: !And
    - !Condition 'EnableAlarms'
    - !Condition 'CreateLogsServices'
  CreateAlarmLakerunnerCompactMetrics: !And
    - !Condition 'EnableAlarms'
    - !Condition 'CreateMetricsServices'
  CreateAlarmLakerunnerCompactTraces: !And
    - !Condition 'EnableAlarms'
    - !Condition 'CreateTracesServices'
  CreateAlarmLakerunnerIngestLogs: !And
    - !Condition 'EnableAlarms'
    - !Condition 'CreateLogsServices'
  CreateAlarmLakerunnerIngestMetrics: !And
    - !Condition 'EnableAlarms'
    - !Condition 'CreateMetricsServices'
  CreateAlarmLakerunnerIngestTraces: !And
    - !Condition 'EnableAlarms'
    - !Condition 'CreateTracesServices'
  CreateAlarmLakerunnerRollupMetrics: !And
    - !Condition 'EnableAlarms'
    - !Condition 'CreateMetricsServices'
  CreateLogsServices: !Equals
    - !Ref 'EnableLogs'
    - 'Yes'
  CreateMetricsServices: !Equals
    - !Ref 'EnableMetrics'
    - 'Yes'
  CreateTracesServices: !Equals
    - !Ref 'EnableTraces'
    - 'Yes'
  EnableAdminApi: !Not
    - !Equals
      - !Ref 'AdminApiReplicas'
      - '0'
  EnableAlarms: !Not
    - !Equals
      - !Ref 'AlertTopicArn'
      - ''
  EnableAlertEvaluator: !Not
    - !Equals
      - !Ref 'AlertEvaluatorReplicas'
      - '0'
  EnableOtlp: !Not
    - !Equals
      - !Ref 'OtelEndpoint'
      - ''
  IsInternetFacing: !Equals
    - !Ref 'AlbScheme'
    - internet-facing
Description: 'Lakerunner Services: ECS services, task definitions, IAM roles, and ALB integration'
Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: Infrastructure
        Parameters:
          - CommonInfraStackName
          - AlbScheme
          - LicenseData
      - Label:
          default: Signal Types
        Parameters:
          - EnableLogs
          - EnableMetrics
          - EnableTraces
      - Label:
          default: Query Services Configuration
        Parameters:
          - QueryApiReplicas
          - QueryApiCpu
          - QueryApiMemory
          - QueryWorkerReplicas
          - QueryWorkerCpu
          - QueryWorkerMemory
      - Label:
          default: Worker Services Configuration
        Parameters:
          - IngestLogsReplicas
          - IngestLogsMemory
          - IngestMetricsReplicas
          - IngestMetricsMemory
          - IngestTracesReplicas
          - IngestTracesMemory
          - CompactLogsReplicas
          - CompactLogsMemory
          - CompactMetricsReplicas
          - CompactMetricsMemory
          - CompactTracesReplicas
          - CompactTracesMemory
          - RollupMetricsReplicas
          - RollupMetricsMemory
      - Label:
          default: Other Services Configuration
        Parameters:
          - PubsubSqsReplicas
          - BoxerCommonReplicas
          - AdminApiReplicas
          - AlertEvaluatorReplicas
      - Label:
          default: Auto-Scaling Configuration
        Parameters:
          - AutoScalingCPUTarget
          - AutoScalingScaleOutCooldown
          - AutoScalingScaleInCooldown
      - Label:
          default: MSK Configuration
        Parameters:
          - MSKBrokers
      - Label:
          default: Container Images
        Parameters:
          - GoServicesImage
      - Label:
          default: Telemetry
        Parameters:
          - OtelEndpoint
      - Label:
          default: Alerting
        Parameters:
          - AlertTopicArn
    ParameterLabels:
      AdminApiReplicas:
        default: Admin Api Replicas
      AlbScheme:
        default: ALB Scheme
      AlertEvaluatorReplicas:
        default: Alert Evaluator Replicas
      AlertTopicArn:
        default: Alert SNS Topic ARN
      AutoScalingCPUTarget:
        default: CPU Target % (Auto-Scaling)
      AutoScalingScaleInCooldown:
        default: Scale-In Cooldown (seconds)
      AutoScalingScaleOutCooldown:
        default: Scale-Out Cooldown (seconds)
      BoxerCommonReplicas:
        default: Boxer Common Replicas
      CommonInfraStackName:
        default: Common Infra Stack Name
      CompactLogsMemory:
        default: Compact Logs Memory (MiB)
      CompactLogsReplicas:
        default: Compact Logs Max Replicas
      CompactMetricsMemory:
        default: Compact Metrics Memory (MiB)
      CompactMetricsReplicas:
        default: Compact Metrics Max Replicas
      CompactTracesMemory:
        default: Compact Traces Memory (MiB)
      CompactTracesReplicas:
        default: Compact Traces Max Replicas
      EnableLogs:
        default: Enable Logs
      EnableMetrics:
        default: Enable Metrics
      EnableTraces:
        default: Enable Traces
      GoServicesImage:
        default: Go Services Image
      IngestLogsMemory:
        default: Ingest Logs Memory (MiB)
      IngestLogsReplicas:
        default: Ingest Logs Max Replicas
      IngestMetricsMemory:
        default: Ingest Metrics Memory (MiB)
      IngestMetricsReplicas:
        default: Ingest Metrics Max Replicas
      IngestTracesMemory:
        default: Ingest Traces Memory (MiB)
      IngestTracesReplicas:
        default: Ingest Traces Max Replicas
      LicenseData:
        default: License Data (JSON)
      MSKBrokers:
        default: MSK Broker Endpoints
      OtelEndpoint:
        default: OTEL Collector Endpoint
      PubsubSqsReplicas:
        default: Pubsub Sqs Replicas
      QueryApiCpu:
        default: Query Api CPU
      QueryApiMemory:
        default: Query Api Memory (MiB)
      QueryApiReplicas:
        default: Query Api Replicas
      QueryWorkerCpu:
        default: Query Worker CPU
      QueryWorkerMemory:
        default: Query Worker Memory (MiB)
      QueryWorkerReplicas:
        default: Query Worker Replicas
      RollupMetricsMemory:
        default: Rollup Metrics Memory (MiB)
      RollupMetricsReplicas:
        default: Rollup Metrics Max Replicas
Outputs:
  AdminApiNlbDNS:
    Condition: EnableAdminApi
    Description: Admin API NLB DNS name (GRPC on port 9091)
    Export:
      Name: !Sub '${AWS::StackName}-AdminApiNlbDNS'
    Value: !GetAtt 'AdminApiNlb.DNSName'
  AlbArn:
    Export:
      Name: !Sub '${AWS::StackName}-AlbArn'
    Value: !Ref 'Alb'
  AlbDNS:
    Export:
      Name: !Sub '${AWS::StackName}-AlbDNS'
    Value: !GetAtt 'Alb.DNSName'
  ExecutionRoleArn:
    Export:
      Name: !Sub '${AWS::StackName}-ExecutionRoleArn'
    Value: !GetAtt 'ExecRole.Arn'
  ServiceLakerunnerAdminApiArn:
    Condition: EnableAdminApi
    Export:
      Name: !Sub '${AWS::StackName}-lakerunner-admin-api-ServiceArn'
    Value: !Ref 'ServiceLakerunnerAdminApi'
  ServiceLakerunnerAlertEvaluatorArn:
    Condition: EnableAlertEvaluator
    Export:
      Name: !Sub '${AWS::StackName}-lakerunner-alert-evaluator-ServiceArn'
    Value: !Ref 'ServiceLakerunnerAlertEvaluator'
  ServiceLakerunnerBoxerCommonArn:
    Export:
      Name: !Sub '${AWS::StackName}-lakerunner-boxer-common-ServiceArn'
    Value: !Ref 'ServiceLakerunnerBoxerCommon'
  ServiceLakerunnerCompactLogsArn:
    Condition: CreateLogsServices
    Export:
      Name: !Sub '${AWS::StackName}-lakerunner-compact-logs-ServiceArn'
    Value: !Ref 'ServiceLakerunnerCompactLogs'
  ServiceLakerunnerCompactMetricsArn:
    Condition: CreateMetricsServices
    Export:
      Name: !Sub '${AWS::StackName}-lakerunner-compact-metrics-ServiceArn'
    Value: !Ref 'ServiceLakerunnerCompactMetrics'
  ServiceLakerunnerCompactTracesArn:
    Condition: CreateTracesServices
    Export:
      Name: !Sub '${AWS::StackName}-lakerunner-compact-traces-ServiceArn'
    Value: !Ref 'ServiceLakerunnerCompactTraces'
  ServiceLakerunnerIngestLogsArn:
    Condition: CreateLogsServices
    Export:
      Name: !Sub '${AWS::StackName}-lakerunner-ingest-logs-ServiceArn'
    Value: !Ref 'ServiceLakerunnerIngestLogs'
  ServiceLakerunnerIngestMetricsArn:
    Condition: CreateMetricsServices
    Export:
      Name: !Sub '${AWS::StackName}-lakerunner-ingest-metrics-ServiceArn'
    Value: !Ref 'ServiceLakerunnerIngestMetrics'
  ServiceLakerunnerIngestTracesArn:
    Condition: CreateTracesServices
    Export:
      Name: !Sub '${AWS::StackName}-lakerunner-ingest-traces-ServiceArn'
    Value: !Ref 'ServiceLakerunnerIngestTraces'
  ServiceLakerunnerMonitoringArn:
    Export:
      Name: !Sub '${AWS::StackName}-lakerunner-monitoring-ServiceArn'
    Value: !Ref 'ServiceLakerunnerMonitoring'
  ServiceLakerunnerPubsubSqsArn:
    Export:
      Name: !Sub '${AWS::StackName}-lakerunner-pubsub-sqs-ServiceArn'
    Value: !Ref 'ServiceLakerunnerPubsubSqs'
  ServiceLakerunnerQueryApiArn:
    Export:
      Name: !Sub '${AWS::StackName}-lakerunner-query-api-ServiceArn'
    Value: !Ref 'ServiceLakerunnerQueryApi'
  ServiceLakerunnerQueryWorkerArn:
    Export:
      Name: !Sub '${AWS::StackName}-lakerunner-query-worker-ServiceArn'
    Value: !Ref 'ServiceLakerunnerQueryWorker'
  ServiceLakerunnerRollupMetricsArn:
    Condition: CreateMetricsServices
    Export:
      Name: !Sub '${AWS::StackName}-lakerunner-rollup-metrics-ServiceArn'
    Value: !Ref 'ServiceLakerunnerRollupMetrics'
  ServiceLakerunnerSweeperArn:
    Export:
      Name: !Sub '${AWS::StackName}-lakerunner-sweeper-ServiceArn'
    Value: !Ref 'ServiceLakerunnerSweeper'
  TaskRoleArn:
    Export:
      Name: !Sub '${AWS::StackName}-TaskRoleArn'
    Value: !GetAtt 'TaskRole.Arn'
  Tg7101Arn:
    Export:
      Name: !Sub '${AWS::StackName}-Tg7101Arn'
    Value: !Ref 'Tg7101'
Parameters:
  AdminApiReplicas:
    Default: '1'
    Description: Number of lakerunner-admin-api task replicas
    MinValue: 0
    Type: Number
  AlbScheme:
    AllowedValues:
      - internet-facing
      - internal
    Default: internal
    Description: 'Load balancer scheme: ''internet-facing'' for external access or ''internal'' for internal access only.'
    Type: String
  AlertEvaluatorReplicas:
    Default: '1'
    Description: Number of lakerunner-alert-evaluator task replicas
    MinValue: 0
    Type: Number
  AlertTopicArn:
    Default: ''
    Description: 'OPTIONAL: SNS Topic ARN for CloudWatch alarms. Leave blank to disable task count alarms. Deploy the Alerting stack first to create a topic.'
    Type: String
  AutoScalingCPUTarget:
    Default: '70'
    Description: Target CPU utilization percentage for scaling (e.g., 70 means scale when avg CPU > 70%)
    MaxValue: 95
    MinValue: 10
    Type: Number
  AutoScalingScaleInCooldown:
    Default: '300'
    Description: Seconds to wait after a scale-in before another scale-in can occur
    MaxValue: 3600
    MinValue: 0
    Type: Number
  AutoScalingScaleOutCooldown:
    Default: '60'
    Description: Seconds to wait after a scale-out before another scale-out can occur
    MaxValue: 3600
    MinValue: 0
    Type: Number
  BoxerCommonReplicas:
    Default: '1'
    Description: Number of lakerunner-boxer-common task replicas
    MinValue: 0
    Type: Number
  CommonInfraStackName:
    Description: 'REQUIRED: Name of the CommonInfra stack to import infrastructure values from.'
    Type: String
  CompactLogsMemory:
    AllowedValues:
      - '2048'
      - '3072'
      - '4096'
      - '5120'
      - '6144'
      - '7168'
      - '8192'
    Default: '2048'
    Description: 'Memory (MiB) for lakerunner-compact-logs. Valid values for 1024 CPU: 2048, 3072, 4096, 5120, 6144, 7168, 8192'
    Type: Number
  CompactLogsReplicas:
    Default: '10'
    Description: Maximum number of lakerunner-compact-logs tasks (auto-scales from 1 to this value)
    MaxValue: 50
    MinValue: 1
    Type: Number
  CompactMetricsMemory:
    AllowedValues:
      - '2048'
      - '3072'
      - '4096'
      - '5120'
      - '6144'
      - '7168'
      - '8192'
    Default: '2048'
    Description: 'Memory (MiB) for lakerunner-compact-metrics. Valid values for 1024 CPU: 2048, 3072, 4096, 5120, 6144, 7168, 8192'
    Type: Number
  CompactMetricsReplicas:
    Default: '10'
    Description: Maximum number of lakerunner-compact-metrics tasks (auto-scales from 1 to this value)
    MaxValue: 50
    MinValue: 1
    Type: Number
  CompactTracesMemory:
    AllowedValues:
      - '2048'
      - '3072'
      - '4096'
      - '5120'
      - '6144'
      - '7168'
      - '8192'
    Default: '2048'
    Description: 'Memory (MiB) for lakerunner-compact-traces. Valid values for 1024 CPU: 2048, 3072, 4096, 5120, 6144, 7168, 8192'
    Type: Number
  CompactTracesReplicas:
    Default: '10'
    Description: Maximum number of lakerunner-compact-traces tasks (auto-scales from 1 to this value)
    MaxValue: 50
    MinValue: 1
    Type: Number
  EnableLogs:
    AllowedValues:
      - 'Yes'
      - 'No'
    Default: 'Yes'
    Description: Enable log processing services (ingest-logs, compact-logs)
    Type: String
  EnableMetrics:
    AllowedValues:
      - 'Yes'
      - 'No'
    Default: 'Yes'
    Description: Enable metrics processing services (ingest-metrics, compact-metrics, rollup-metrics)
    Type: String
  EnableTraces:
    AllowedValues:
      - 'Yes'
      - 'No'
    Default: 'No'
    Description: Enable trace processing services (ingest-traces, compact-traces)
    Type: String
  GoServicesImage:
    Default: ghcr.io/cardinalhq/lakerunner:v1.14.0
    Description: Container image for all Go services (pubsub, ingest, compact, query-api, query-worker, etc.)
    Type: String
  IngestLogsMemory:
    AllowedValues:
      - '2048'
      - '3072'
      - '4096'
      - '5120'
      - '6144'
      - '7168'
      - '8192'
    Default: '2048'
    Description: 'Memory (MiB) for lakerunner-ingest-logs. Valid values for 1024 CPU: 2048, 3072, 4096, 5120, 6144, 7168, 8192'
    Type: Number
  IngestLogsReplicas:
    Default: '10'
    Description: Maximum number of lakerunner-ingest-logs tasks (auto-scales from 1 to this value)
    MaxValue: 50
    MinValue: 1
    Type: Number
  IngestMetricsMemory:
    AllowedValues:
      - '2048'
      - '3072'
      - '4096'
      - '5120'
      - '6144'
      - '7168'
      - '8192'
    Default: '2048'
    Description: 'Memory (MiB) for lakerunner-ingest-metrics. Valid values for 1024 CPU: 2048, 3072, 4096, 5120, 6144, 7168, 8192'
    Type: Number
  IngestMetricsReplicas:
    Default: '10'
    Description: Maximum number of lakerunner-ingest-metrics tasks (auto-scales from 1 to this value)
    MaxValue: 50
    MinValue: 1
    Type: Number
  IngestTracesMemory:
    AllowedValues:
      - '2048'
      - '3072'
      - '4096'
      - '5120'
      - '6144'
      - '7168'
      - '8192'
    Default: '2048'
    Description: 'Memory (MiB) for lakerunner-ingest-traces. Valid values for 1024 CPU: 2048, 3072, 4096, 5120, 6144, 7168, 8192'
    Type: Number
  IngestTracesReplicas:
    Default: '10'
    Description: Maximum number of lakerunner-ingest-traces tasks (auto-scales from 1 to this value)
    MaxValue: 50
    MinValue: 1
    Type: Number
  LicenseData:
    Description: 'REQUIRED: License JSON content. Changes to this value trigger service redeployment.'
    Type: String
  MSKBrokers:
    Default: ''
    Description: 'REQUIRED: Comma-separated list of MSK broker endpoints (hostname:port)'
